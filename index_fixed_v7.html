<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8fb8e8" />
  <title>מעקב תינוק</title>
  <link rel="manifest" href="manifest.json?v=7" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{--card:#ffffff;--line:#dbe7f6;--primary:#8fb8e8;--primary2:#dfeeff;--text:#1e2a3a;--muted:#6e7a8a;--shadow:0 8px 24px rgba(32,62,100,.10);--radius:18px;--field-h:48px;--page-pad:14px;--ok:#e8f7ec;--ok-text:#1f6b36;--warn:#fff4df;--warn-text:#8a5a00;--err:#ffe8e8;--err-text:#8f2424}
    *{box-sizing:border-box} html,body{overflow-x:hidden}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#edf5ff 0%,#f7fbff 45%,#ffffff 100%);color:var(--text);-webkit-text-size-adjust:100%}
    .wrap{max-width:760px;margin:0 auto;padding:var(--page-pad) var(--page-pad) 42px}
    .hero{display:grid;grid-template-columns:84px 1fr;gap:14px;align-items:center;background:rgba(255,255,255,.72);backdrop-filter:blur(8px);border:1px solid #e9f1fb;border-radius:24px;padding:14px;box-shadow:var(--shadow);position:sticky;top:0;z-index:5;margin-bottom:14px;overflow:hidden}
    .hero img{width:84px;height:84px;object-fit:cover;border-radius:22px;border:3px solid #fff;box-shadow:var(--shadow);background:#eef5ff}
    h1{font-size:28px;line-height:1.1;margin:0 0 6px}.sub{color:var(--muted);font-size:14px;line-height:1.35}.grid{display:grid;gap:14px}
    .card{background:var(--card);border:1px solid #ecf2fa;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;overflow:hidden;min-width:0}
    .section-title{font-size:18px;font-weight:700;margin:0 0 10px;line-height:1.2}
    label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px;line-height:1.25}
    input,textarea,button{font:inherit}
    input[type="date"],input[type="time"],input[type="number"],textarea{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#fbfdff;color:var(--text);outline:none;font-size:16px;line-height:1.2;appearance:none;-webkit-appearance:none;display:block}
    input[type="date"],input[type="time"],input[type="number"]{height:var(--field-h)} textarea{min-height:96px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;align-items:end}.field{min-width:0}
    .chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--line);background:#f7fbff;border-radius:999px;padding:10px 14px;cursor:pointer;user-select:none;line-height:1.15;font-size:15px}.chip.active{background:var(--primary2);border-color:#b8d2f3}
    .btn{border:0;border-radius:16px;min-height:48px;padding:13px 16px;background:var(--primary);color:#0d2540;font-weight:700;cursor:pointer;box-shadow:var(--shadow);line-height:1.2;display:inline-flex;align-items:center;justify-content:center;text-align:center}
    .btn.secondary{background:#eef5ff}.btn.danger{background:#ffe8e8;color:#8f2424}.btn.full{width:100%}
    .quick,.stats{display:grid;gap:10px;width:100%}.quick{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,1fr)}
    .stat{background:#f8fbff;border:1px solid var(--line);padding:12px 8px;border-radius:16px;text-align:center}.stat b{display:block;font-size:22px;margin-bottom:4px;line-height:1}.stat span{display:block;font-size:13px;line-height:1.25;word-break:break-word}
    .list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fcfeff}
    .item-top{display:flex;justify-content:space-between;gap:8px;align-items:center}.badge{background:#eef5ff;border:1px solid #d8e7fb;padding:6px 10px;border-radius:999px;font-size:12px;display:inline-block}
    .muted{color:var(--muted);font-size:13px;line-height:1.35;word-break:break-word}.actions,.small-actions{display:flex;gap:8px;flex-wrap:wrap}
    .footer-note{padding:8px 4px 0;color:var(--muted);font-size:12px;text-align:center;line-height:1.35}.install{display:none}
    .status-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:10px;padding:10px 12px;border-radius:14px;border:1px solid var(--line);background:#f8fbff}
    .status-pill{padding:7px 10px;border-radius:999px;font-size:13px;font-weight:700}.status-ok{background:var(--ok);color:var(--ok-text)}.status-warn{background:var(--warn);color:var(--warn-text)}.status-err{background:var(--err);color:var(--err-text)}
    .small-btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 10px;cursor:pointer;font-size:13px}
    @media (max-width:640px){:root{--field-h:46px;--page-pad:12px}.hero{grid-template-columns:72px 1fr;gap:12px;padding:12px}.hero img{width:72px;height:72px}h1{font-size:24px}.row,.stats,.quick{grid-template-columns:1fr}.card{padding:12px}.section-title{font-size:17px}.chip,.actions .btn{width:100%}.item-top,.status-bar{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <img src="icon-192.png" alt="תינוק" />
    <div>
      <h1>מעקב תינוק 👶</h1>
      <div class="sub">מעקב יומי מסונכרן בין מכשירים, עם תמיכה באופליין.</div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="section-title">מצב סנכרון</div>
      <div class="status-bar">
        <div id="syncStatus" class="status-pill status-warn">טוען...</div>
        <div class="muted" id="syncMeta">מכין נתונים</div>
        <div class="small-actions">
          <button class="small-btn" type="button" onclick="manualSync()">סנכרן עכשיו</button>
          <button class="small-btn" type="button" onclick="forceReloadFromServer()">רענון מהשרת</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">תאריך</div>
      <div class="row">
        <div class="field">
          <label for="logDate">יום מעקב</label>
          <input id="logDate" type="date" />
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button id="installBtn" class="btn secondary full install" type="button">התקן למסך הבית</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">פעולות מהירות</div>
      <div class="quick">
        <button class="btn" type="button" onclick="quickAdd('האכלה', 90)">🍼 האכלה 90 מ״ל</button>
        <button class="btn" type="button" onclick="quickAdd('פיפי', '')">💧 פיפי</button>
        <button class="btn" type="button" onclick="quickAdd('קקי', '')">💩 קקי</button>
        <button class="btn" type="button" onclick="quickAdd('ויטמינים', '')">💊 ויטמינים</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">רישום חדש</div>
      <div class="chips" id="typeChips">
        <div class="chip active" data-type="האכלה">🍼 האכלה</div>
        <div class="chip" data-type="פיפי">💧 פיפי</div>
        <div class="chip" data-type="קקי">💩 קקי</div>
        <div class="chip" data-type="ויטמינים">💊 ויטמינים</div>
        <div class="chip" data-type="הערה">📝 הערה</div>
      </div>
      <div class="row" style="margin-top:12px">
        <div class="field">
          <label for="time">שעה</label>
          <input id="time" type="time" />
        </div>
        <div class="field">
          <label for="amount">כמות (מ״ל)</label>
          <input id="amount" type="number" placeholder="למשל 90" />
        </div>
      </div>
      <div style="margin-top:10px">
        <label for="note">הערות</label>
        <textarea id="note" placeholder="למשל: גרפס חלש / פליטה קטנה / ישן מיד אחרי"></textarea>
      </div>
      <div class="actions" style="margin-top:12px">
        <button class="btn" type="button" onclick="addEntry()">שמור רישום</button>
        <button class="btn secondary" type="button" onclick="fillNow()">שעה עכשיו</button>
        <button class="btn secondary" type="button" onclick="clearForm()">נקה</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">סיכום יומי</div>
      <div class="stats">
        <div class="stat"><b id="feedCount">0</b><span>האכלות</span></div>
        <div class="stat"><b id="feedMl">0</b><span>מ״ל סה״כ</span></div>
        <div class="stat"><b id="peeCount">0</b><span>פיפי</span></div>
        <div class="stat"><b id="poopCount">0</b><span>קקי</span></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">רישומים של היום</div>
      <div class="actions" style="margin-bottom:10px">
        <button class="btn secondary" type="button" onclick="exportJson()">ייצוא גיבוי</button>
        <button class="btn secondary" type="button" onclick="document.getElementById('importFile').click()">ייבוא גיבוי</button>
        <input id="importFile" type="file" accept=".json" style="display:none" onchange="importJson(event)" />
        <button class="btn danger" type="button" onclick="clearDay()">נקה יום זה</button>
      </div>
      <div id="entries" class="list"></div>
    </div>
  </div>

  <div class="footer-note">אם עדכון לא מופיע מיד, סגור ופתח שוב או לחץ "רענון מהשרת".</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby01IWXdEG-RRhsotvYTI1EAUdwfTpyHK0T5S6ulfQRE5_nbTAkoJ4eBZMCmRMGWCQjkA/exec';
const API_TOKEN = 'bt_7Fh29KqP4mX9Za81JrT6UvN2LsQ0';
const STORAGE_KEY = 'baby-tracker-v7-state';
const QUEUE_KEY = 'baby-tracker-v7-queue';
const DEVICE_KEY = 'baby-tracker-v7-device';
const SYNC_KEY = 'baby-tracker-v7-sync-meta';
let deferredPrompt = null;
let currentType = 'האכלה';
let syncInProgress = false;

function getTodayStr(){const d=new Date();const off=d.getTimezoneOffset();return new Date(d.getTime()-off*60000).toISOString().slice(0,10)}
function nowTime(){return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false})}
function nowIso(){return new Date().toISOString()}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function typeEmoji(type){return {"האכלה":"🍼","פיפי":"💧","קקי":"💩","ויטמינים":"💊","הערה":"📝"}[type]||"•"}
function getDeviceId(){let id=localStorage.getItem(DEVICE_KEY);if(!id){id='dev_'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem(DEVICE_KEY,id)}return id}
function loadState(){try{const data=JSON.parse(localStorage.getItem(STORAGE_KEY));return data&&Array.isArray(data.entries)?data:{entries:[]}}catch{return{entries:[]}}}
function saveState(state){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function loadQueue(){try{const q=JSON.parse(localStorage.getItem(QUEUE_KEY));return Array.isArray(q)?q:[]}catch{return[]}}
function saveQueue(queue){localStorage.setItem(QUEUE_KEY,JSON.stringify(queue))}
function loadSyncMeta(){try{return JSON.parse(localStorage.getItem(SYNC_KEY))||{}}catch{return{}}}
function saveSyncMeta(meta){localStorage.setItem(SYNC_KEY,JSON.stringify(meta))}
function normalizeDateStr(value){
  if(!value) return '';
  if(typeof value==='string'){
    if(/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
    if(/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(value)){const [d,m,y]=value.split('.');return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
    const parsed=new Date(value);
    if(!isNaN(parsed)){const off=parsed.getTimezoneOffset();return new Date(parsed.getTime()-off*60000).toISOString().slice(0,10);}
  }
  if(Object.prototype.toString.call(value)==='[object Date]'&&!isNaN(value)){const off=value.getTimezoneOffset();return new Date(value.getTime()-off*60000).toISOString().slice(0,10);}
  return '';
}
function normalizeEntry(raw){
  return {id:String(raw.id||''),createdAt:String(raw.createdAt||raw.updatedAt||nowIso()),updatedAt:String(raw.updatedAt||raw.createdAt||nowIso()),date:normalizeDateStr(raw.date),time:String(raw.time||''),type:String(raw.type||''),amount:raw.amount===null||raw.amount===undefined?'':String(raw.amount),note:String(raw.note||''),device:String(raw.device||''),deleted:raw.deleted===true||raw.deleted==='true'||raw.deleted==='TRUE'};
}
function mergeEntries(localEntries,incomingEntries){
  const map=new Map();
  [...localEntries,...incomingEntries].forEach(item=>{const entry=normalizeEntry(item);if(!entry.id)return;const existing=map.get(entry.id);if(!existing){map.set(entry.id,entry);return;}const existingTs=new Date(existing.updatedAt||existing.createdAt||0).getTime();const newTs=new Date(entry.updatedAt||entry.createdAt||0).getTime();if(newTs>=existingTs)map.set(entry.id,entry);});
  return Array.from(map.values());
}
function getEntriesForDay(date){const state=loadState();return state.entries.map(normalizeEntry).filter(e=>!e.deleted&&normalizeDateStr(e.date)===normalizeDateStr(date)).sort((a,b)=>(a.time||'').localeCompare(b.time||''))}
function render(){
  const date=document.getElementById('logDate').value;
  const entries=getEntriesForDay(date);
  const box=document.getElementById('entries');
  if(!entries.length){box.innerHTML='<div class="muted">עדיין אין רישומים ליום הזה.</div>';}
  else{
    box.innerHTML=entries.map(e=>`
      <div class="item">
        <div class="item-top">
          <div><span class="badge">${typeEmoji(e.type)} ${esc(e.type)}</span></div>
          <div><b>${esc(e.time||'')}</b></div>
        </div>
        <div class="muted" style="margin-top:8px">${e.amount?`כמות: <b>${esc(e.amount)}</b> מ״ל`:'ללא כמות'}${e.note?' · '+esc(e.note):''}</div>
        <div class="actions" style="margin-top:10px">
          <button class="btn secondary" type="button" onclick="editEntry('${e.id}')">עריכה</button>
          <button class="btn danger" type="button" onclick="deleteEntry('${e.id}')">מחיקה</button>
        </div>
      </div>`).join('');
  }
  const feedEntries=entries.filter(e=>e.type==='האכלה');
  document.getElementById('feedCount').textContent=feedEntries.length;
  document.getElementById('feedMl').textContent=feedEntries.reduce((s,e)=>s+Number(e.amount||0),0);
  document.getElementById('peeCount').textContent=entries.filter(e=>e.type==='פיפי').length;
  document.getElementById('poopCount').textContent=entries.filter(e=>e.type==='קקי').length;
  updateSyncStatus();
}
function upsertLocalEntry(entry){const state=loadState();state.entries=mergeEntries(state.entries,[entry]);saveState(state)}
function enqueue(action,payload){const q=loadQueue();q.push({action,payload,queuedAt:nowIso()});saveQueue(q);updateSyncStatus()}
function setStatus(text,kind,metaText){const el=document.getElementById('syncStatus');const meta=document.getElementById('syncMeta');el.textContent=text;el.className=`status-pill ${kind}`;meta.textContent=metaText||''}
function updateSyncStatus(){const q=loadQueue();const meta=loadSyncMeta();if(!navigator.onLine){setStatus('אופליין','status-warn',`יש ${q.length} פעולות שממתינות לחיבור`);return;}if(syncInProgress){setStatus('מסנכרן','status-warn','שולח ומושך נתונים מהשרת');return;}if(meta.lastError){setStatus('שגיאת סנכרון','status-err',meta.lastError);return;}const last=meta.lastSuccessAt?new Date(meta.lastSuccessAt).toLocaleString('he-IL'):'עדיין לא בוצע';setStatus('מסונכרן','status-ok',`ממתינות ${q.length} פעולות · סנכרון אחרון: ${last}`)}
function makeEntry({date,time,type,amount,note}){const ts=nowIso();return{id:'entry_'+Math.random().toString(36).slice(2)+Date.now().toString(36),createdAt:ts,updatedAt:ts,date:normalizeDateStr(date),time:time||nowTime(),type:type||'',amount:type==='האכלה'?String(amount||''):'',note:note||'',device:getDeviceId(),deleted:false}}
function fillNow(){document.getElementById('time').value=nowTime()}
function clearForm(){document.getElementById('amount').value='';document.getElementById('note').value='';document.getElementById('time').value=nowTime()}
document.querySelectorAll('#typeChips .chip').forEach(chip=>{chip.addEventListener('click',()=>{document.querySelectorAll('#typeChips .chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');currentType=chip.dataset.type;const amount=document.getElementById('amount');amount.disabled=currentType!=='האכלה';if(currentType!=='האכלה')amount.value='';});});
function addEntry(){const entry=makeEntry({date:document.getElementById('logDate').value,time:document.getElementById('time').value,type:currentType,amount:document.getElementById('amount').value,note:document.getElementById('note').value.trim()});upsertLocalEntry(entry);enqueue('save',entry);clearForm();render();syncAll()}
function quickAdd(type,amount){const entry=makeEntry({date:document.getElementById('logDate').value,time:nowTime(),type,amount,note:''});upsertLocalEntry(entry);enqueue('save',entry);render();syncAll()}
function findEntryById(id){return loadState().entries.map(normalizeEntry).find(e=>e.id===id)}
function editEntry(id){const e=findEntryById(id);if(!e)return;currentType=e.type;document.querySelectorAll('#typeChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.type===e.type));document.getElementById('time').value=e.time||'';document.getElementById('amount').value=e.amount||'';document.getElementById('note').value=e.note||'';const amount=document.getElementById('amount');amount.disabled=currentType!=='האכלה';deleteEntry(id,true)}
function deleteEntry(id,silent){const e=findEntryById(id);if(!e)return;const updated={...e,deleted:true,updatedAt:nowIso()};upsertLocalEntry(updated);enqueue('delete',{id});render();if(!silent)syncAll()}
function clearDay(){const date=document.getElementById('logDate').value;if(!confirm('למחוק את כל הרישומים של היום הזה?'))return;getEntriesForDay(date).forEach(e=>deleteEntry(e.id,true));render();syncAll()}
function exportJson(){const blob=new Blob([JSON.stringify(loadState(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='baby-tracker-backup.json';a.click()}
function importJson(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);const incoming=Array.isArray(data.entries)?data.entries:[];const state=loadState();state.entries=mergeEntries(state.entries,incoming);saveState(state);render();alert('הגיבוי יובא בהצלחה');syncAll();}catch{alert('הקובץ לא תקין');}};reader.readAsText(file)}
async function apiGetAll(){const url=`${API_URL}?token=${encodeURIComponent(API_TOKEN)}&_=${Date.now()}`;const res=await fetch(url,{method:'GET',cache:'no-store'});return res.json()}
async function apiSave(entry){const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:API_TOKEN,action:'save',entry})});return res.json()}
async function apiDelete(id){const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:API_TOKEN,action:'delete',id})});return res.json()}
async function flushQueue(){const queue=loadQueue();if(!queue.length)return;const remaining=[];for(const item of queue){try{let result;if(item.action==='save')result=await apiSave(item.payload);else if(item.action==='delete')result=await apiDelete(item.payload.id);else result={ok:true};if(!result.ok)remaining.push(item);}catch{remaining.push(item);}}saveQueue(remaining)}
async function pullFromServer(){const result=await apiGetAll();if(!result.ok)throw new Error(result.error||'Failed to fetch');const serverEntries=(result.data||[]).map(normalizeEntry);const state=loadState();state.entries=mergeEntries(state.entries,serverEntries);saveState(state)}
async function syncAll(){if(syncInProgress)return;if(!navigator.onLine){updateSyncStatus();return;}syncInProgress=true;updateSyncStatus();try{await flushQueue();await pullFromServer();saveSyncMeta({lastSuccessAt:nowIso(),lastError:''});}catch(err){saveSyncMeta({...loadSyncMeta(),lastError:String(err.message||err)});}finally{syncInProgress=false;render();}}
function manualSync(){syncAll()}
async function forceReloadFromServer(){if(!navigator.onLine)return updateSyncStatus();syncInProgress=true;updateSyncStatus();try{await pullFromServer();saveSyncMeta({lastSuccessAt:nowIso(),lastError:''});}catch(err){saveSyncMeta({...loadSyncMeta(),lastError:String(err.message||err)});}finally{syncInProgress=false;render();}}

document.getElementById('logDate').value=getTodayStr();
document.getElementById('logDate').addEventListener('change',render);
fillNow(); render(); syncAll();
setInterval(syncAll,15000);
window.addEventListener('online',syncAll);
window.addEventListener('focus',syncAll);
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js?v=7').catch(()=>{});}
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBtn').style.display='block';});
document.getElementById('installBtn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;});
</script>
</body>
</html>
