<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8fb8e8" />
  <title>מעקב תינוק</title>
  <link rel="manifest" href="manifest.json?v=21" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{
      --bg1:#eef5ff;
      --bg2:#f8fbff;
      --card:#ffffffd8;
      --card-solid:#ffffff;
      --line:#dbe7f6;
      --line-strong:#c7daf5;
      --primary:#7eaee8;
      --primary-dark:#6998d3;
      --primary-soft:#e8f2ff;
      --text:#1d2a3c;
      --muted:#728096;
      --danger-text:#8f2424;
      --ok:#e8f7ec;
      --ok-text:#1f6b36;
      --warn:#fff4df;
      --warn-text:#8a5a00;
      --vit-off-bg:#ffe8e8;
      --vit-off-text:#8f2424;
      --vit-on-bg:#e8f7ec;
      --vit-on-text:#1f6b36;
      --radius:22px;
      --shadow:0 10px 30px rgba(43,77,124,.10);
      --field-h:48px;
      --page-pad:14px;
    }

    *{box-sizing:border-box}
    html,body{overflow-x:hidden}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, #ddeeff 0%, transparent 28%),
        radial-gradient(circle at top left, #f1f7ff 0%, transparent 22%),
        linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 45%,#ffffff 100%);
      -webkit-text-size-adjust:100%;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:var(--page-pad) var(--page-pad) 42px;
    }

    .grid{display:grid;gap:14px}

    .hero{
      display:grid;
      grid-template-columns:1fr 240px;
      gap:14px;
      align-items:stretch;
      background:var(--card);
      backdrop-filter:blur(10px);
      border:1px solid #e8f0fb;
      border-radius:26px;
      padding:14px;
      box-shadow:var(--shadow);
      position:sticky;
      top:0;
      z-index:5;
      margin-bottom:14px;
    }

    .hero-main{
      display:grid;
      grid-template-columns:64px 1fr;
      gap:12px;
      align-items:center;
      min-width:0;
    }

    .hero-main img{
      width:64px;
      height:64px;
      object-fit:cover;
      border-radius:18px;
      border:3px solid #fff;
      box-shadow:var(--shadow);
      background:#eef5ff;
    }

    h1{
      font-size:30px;
      line-height:1.05;
      margin:0;
      letter-spacing:-0.02em;
    }

    .hero-meta{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      align-content:start;
    }

    .mini-card{
      background:linear-gradient(180deg,#fbfdff 0%, #f4f9ff 100%);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px 11px;
      min-width:0;
    }

    .mini-title{
      font-size:11px;
      color:var(--muted);
      margin-bottom:5px;
    }

    .mini-value{
      font-size:13px;
      font-weight:700;
      line-height:1.25;
      word-break:break-word;
    }

    .small-btn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:7px 9px;
      cursor:pointer;
      font-size:12px;
      width:100%;
      margin-top:6px;
    }

    .card{
      background:var(--card-solid);
      border:1px solid #ecf2fa;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      min-width:0;
    }

    .section-title{
      font-size:20px;
      font-weight:800;
      margin:0 0 12px;
      line-height:1.2;
      letter-spacing:-0.02em;
    }

    .status-pill{
      padding:6px 9px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      display:inline-block;
    }

    .status-ok{background:var(--ok);color:var(--ok-text)}
    .status-warn{background:var(--warn);color:var(--warn-text)}

    .muted{
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
      word-break:break-word;
    }

    .now-cards{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      width:100%;
    }

    .now-card{
      background:linear-gradient(180deg,#fbfdff 0%,#f4f9ff 100%);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px 10px;
      min-height:94px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      text-align:center;
    }

    .now-card-title{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .now-card-value{
      font-size:18px;
      font-weight:800;
      line-height:1.15;
    }

    .stats{
      display:grid;
      gap:10px;
      width:100%;
      grid-template-columns:repeat(5,1fr);
    }

    .stat{
      background:linear-gradient(180deg,#fbfdff 0%,#f4f9ff 100%);
      border:1px solid var(--line);
      padding:13px 8px;
      border-radius:18px;
      text-align:center;
      min-height:94px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .stat b{
      display:block;
      font-size:24px;
      margin-bottom:4px;
      line-height:1;
    }

    .stat span{
      display:block;
      font-size:13px;
      line-height:1.25;
      color:var(--muted);
      word-break:break-word;
    }

    .vitamin-stat{
      transition:all .2s ease;
    }

    .vitamin-stat.off{
      background:linear-gradient(180deg,var(--vit-off-bg) 0%, #ffdede 100%);
      border-color:#f3caca;
    }

    .vitamin-stat.off b,
    .vitamin-stat.off span{
      color:var(--vit-off-text);
    }

    .vitamin-stat.on{
      background:linear-gradient(180deg,var(--vit-on-bg) 0%, #dcf1e3 100%);
      border-color:#c8e8d1;
    }

    .vitamin-stat.on b,
    .vitamin-stat.on span{
      color:var(--vit-on-text);
    }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin:0 0 6px;
      line-height:1.25;
    }

    input,button{font:inherit}

    input[type="time"],input[type="number"]{
      width:100%;
      height:var(--field-h);
      padding:12px 14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#fbfdff;
      color:var(--text);
      outline:none;
      font-size:16px;
      appearance:none;
      -webkit-appearance:none;
      transition:border-color .2s ease, box-shadow .2s ease;
    }

    input[type="time"]:focus,input[type="number"]:focus{
      border-color:#b8d2f3;
      box-shadow:0 0 0 4px rgba(143,184,232,.14);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      width:100%;
      align-items:end;
    }

    .field{min-width:0}

    .chips{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      width:100%;
    }

    .chip{
      min-width:0;
      text-align:center;
      border:1px solid var(--line);
      background:#f7fbff;
      border-radius:999px;
      padding:10px 8px;
      cursor:pointer;
      user-select:none;
      line-height:1.15;
      font-size:15px;
      white-space:nowrap;
      transition:all .18s ease;
    }

    .chip.active{
      background:linear-gradient(180deg,#dcecff 0%, #cfe3ff 100%);
      border-color:#b7d1f3;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.55);
    }

    .btn{
      border:0;
      border-radius:16px;
      min-height:46px;
      padding:12px 16px;
      background:linear-gradient(180deg,var(--primary) 0%, var(--primary-dark) 100%);
      color:#0d2540;
      font-weight:800;
      cursor:pointer;
      box-shadow:var(--shadow);
      line-height:1.2;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      transition:transform .15s ease, opacity .2s ease, filter .2s ease;
    }

    .btn:hover{filter:brightness(1.02)}
    .btn:active{transform:translateY(1px)}
    .btn.secondary{
      background:linear-gradient(180deg,#f4f8ff 0%, #e8f1ff 100%);
      color:#223557;
      border:1px solid var(--line);
      box-shadow:none;
    }
    .btn.danger{
      background:linear-gradient(180deg,#ffecec 0%, #ffdede 100%);
      color:var(--danger-text);
      box-shadow:none;
      border:1px solid #f6d1d1;
    }
    .btn:disabled,.small-btn:disabled,.mini-btn:disabled{opacity:.6;cursor:not-allowed}

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .day-nav{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      align-items:stretch;
      margin-bottom:12px;
    }

    .day-nav .btn,
    .day-box{
      min-height:56px;
    }

    .day-box{
      background:linear-gradient(180deg,#fbfdff 0%, #f2f8ff 100%);
      border:1px solid var(--line);
      border-radius:16px;
      padding:8px 10px;
      text-align:center;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-width:0;
    }

    .day-main{
      font-size:16px;
      font-weight:800;
      line-height:1.1;
    }

    .day-sub{
      font-size:11px;
      color:var(--muted);
      margin-top:4px;
    }

    .entries-table{
      display:grid;
      gap:8px;
    }

    .entry-row{
      display:grid;
      grid-template-columns:72px 1fr auto;
      gap:8px;
      align-items:center;
      border:1px solid var(--line);
      background:linear-gradient(180deg,#ffffff 0%,#fbfdff 100%);
      border-radius:16px;
      padding:8px 10px;
    }

    .entry-time{
      font-size:22px;
      font-weight:800;
      line-height:1;
      text-align:center;
      color:#1b2940;
    }

    .entry-main{min-width:0}

    .entry-topline{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:3px;
    }

    .entry-type{
      display:inline-flex;
      align-items:center;
      gap:6px;
      background:#eef5ff;
      border:1px solid #d8e7fb;
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:700;
    }

    .entry-amount{
      font-size:13px;
      color:var(--muted);
    }

    .entry-actions{
      display:flex;
      gap:6px;
      flex-wrap:nowrap;
      justify-content:flex-end;
      align-items:center;
    }

    .mini-btn{
      border:0;
      border-radius:12px;
      padding:7px 11px;
      font-weight:700;
      cursor:pointer;
      background:#eef5ff;
      color:#203458;
      white-space:nowrap;
    }

    .mini-btn.delete{
      background:#ffe8e8;
      color:#8f2424;
    }

    .bottom-tools{
      display:grid;
      gap:10px;
    }

    .footer-note{
      padding:8px 4px 0;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      line-height:1.35;
    }

    @media (max-width:640px){
      :root{--field-h:46px;--page-pad:12px}

      .hero{
        grid-template-columns:1fr;
        gap:12px;
        padding:12px;
      }

      .hero-main{
        grid-template-columns:64px 1fr;
        gap:10px;
      }

      .hero-main img{
        width:64px;
        height:64px;
      }

      h1{font-size:24px}

      .hero-meta{
        grid-template-columns:1fr 1fr;
      }

      .card{padding:12px}
      .section-title{font-size:17px}

      .now-cards{
        grid-template-columns:repeat(2,1fr);
        gap:8px;
      }

      .now-card{
        min-height:78px;
        padding:10px 8px;
      }

      .now-card-title{
        font-size:11px;
      }

      .now-card-value{
        font-size:15px;
      }

      .row{
        grid-template-columns:1fr;
      }

      .chips{
        grid-template-columns:repeat(4,1fr);
        gap:6px;
      }

      .chip{
        font-size:12px;
        padding:10px 2px;
      }

      .stats{
        grid-template-columns:repeat(5,1fr);
        gap:6px;
      }

      .stat{
        padding:10px 4px;
        min-height:82px;
      }

      .stat b{
        font-size:16px;
      }

      .stat span{
        font-size:10px;
      }

      .day-nav{
        grid-template-columns:1fr 1fr 1fr;
        gap:6px;
      }

      .day-nav .btn,
      .day-box{
        min-height:52px;
      }

      .day-nav .btn{
        font-size:12px;
        padding:8px 6px;
      }

      .day-main{
        font-size:14px;
      }

      .day-sub{
        font-size:10px;
      }

      .entry-row{
        grid-template-columns:56px 1fr;
        gap:8px;
        padding:8px 9px;
      }

      .entry-actions{
        grid-column:2;
        justify-content:flex-start;
        margin-top:4px;
      }

      .entry-time{
        font-size:18px;
      }

      .mini-btn{
        padding:7px 10px;
        font-size:12px;
      }

      .top-mini-card{
        padding:9px 10px;
      }

      .top-mini-value{
        font-size:12px;
      }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-main">
      <img src="icon-192.png" alt="תינוק" />
      <div>
        <h1>מעקב תינוק 👶</h1>
      </div>
    </div>

    <div class="hero-meta">
      <div class="mini-card">
        <div class="mini-title">סנכרון</div>
        <div id="syncStatus" class="status-pill status-warn">טוען...</div>
        <div class="muted" id="syncMeta" style="margin-top:6px">מכין נתונים</div>
        <button class="small-btn" type="button" onclick="manualRefresh()">רענון מהשרת</button>
      </div>

      <div class="mini-card">
        <div class="mini-title">תאריך</div>
        <div class="mini-value" id="topDateText">—</div>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="section-title">מצב עכשיו</div>
      <div class="now-cards">
        <div class="now-card">
          <div class="now-card-title">האכלה אחרונה</div>
          <div class="now-card-value" id="lastFeedValue">—</div>
        </div>
        <div class="now-card">
          <div class="now-card-title">פיפי אחרון</div>
          <div class="now-card-value" id="lastPeeValue">—</div>
        </div>
        <div class="now-card">
          <div class="now-card-title">קקי אחרון</div>
          <div class="now-card-value" id="lastPoopValue">—</div>
        </div>
        <div id="lastVitaminCard" class="now-card vitamin-stat off">
          <div class="now-card-title">ויטמינים היום</div>
          <div class="now-card-value" id="lastVitaminValue">לא ניתן</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">סיכום יומי</div>
      <div class="stats">
        <div class="stat"><b id="feedCount">0</b><span>האכלות</span></div>
        <div class="stat"><b id="feedMl">0</b><span>מ״ל סה״כ</span></div>
        <div class="stat"><b id="peeCount">0</b><span>פיפי</span></div>
        <div class="stat"><b id="poopCount">0</b><span>קקי</span></div>
        <div id="vitaminStat" class="stat vitamin-stat off">
          <b id="vitaminIcon">○</b>
          <span>ויטמינים</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">רישום חדש</div>
      <input id="logDate" type="date" style="display:none" />

      <div class="chips" id="typeChips">
        <div class="chip active" data-type="האכלה">🍼 האכלה</div>
        <div class="chip" data-type="פיפי">💧 פיפי</div>
        <div class="chip" data-type="קקי">💩 קקי</div>
        <div class="chip" data-type="ויטמינים">💊 ויטמינים</div>
      </div>

      <div class="row" style="margin-top:12px">
        <div class="field">
          <label for="time">שעה</label>
          <input id="time" type="time" />
        </div>
        <div class="field">
          <label for="amount">כמות (מ״ל)</label>
          <input id="amount" type="number" placeholder="למשל 90" />
        </div>
      </div>

      <div class="actions" style="margin-top:12px">
        <button id="saveBtn" class="btn" type="button" onclick="addEntry()">שמור רישום</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">רישומים של היום</div>

      <div class="day-nav">
        <button class="btn secondary" type="button" onclick="goToNextDay()">יום הבא</button>
        <div class="day-box">
          <div class="day-main" id="selectedDayLabel">—</div>
          <div class="day-sub" id="selectedDaySub">—</div>
        </div>
        <button class="btn secondary" type="button" onclick="goToPrevDay()">יום קודם</button>
      </div>

      <div id="entries" class="entries-table"></div>
    </div>

    <div class="card">
      <div class="bottom-tools">
        <button class="btn secondary" type="button" onclick="exportJson()">ייצוא גיבוי</button>
        <button class="btn danger" type="button" onclick="clearDay()">נקה יום זה</button>
      </div>
    </div>
  </div>

  <div class="footer-note">הרשימה מוצגת מהשעה החדשה לישנה, ואפשר לעבור בין ימים.</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby5HlpD17IG1p217ot4kwuErP4BtVZPa92H9uNQWD3JnkYCBlHyRX0FR7c0eMA1mdVGfw/exec';
const API_TOKEN = 'bt_7Fh29KqP4mX9Za81JrT6UvN2LsQ0';
const STORAGE_KEY = 'baby-tracker-v21-state';
const DEVICE_KEY = 'baby-tracker-v21-device';
const SYNC_KEY = 'baby-tracker-v21-sync-meta';

let currentType = 'האכלה';
let busy = false;

function getTodayStr(){
  const d=new Date();
  const off=d.getTimezoneOffset();
  return new Date(d.getTime()-off*60000).toISOString().slice(0,10);
}
function nowTime(){
  return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
}
function nowIso(){
  return new Date().toISOString();
}
function esc(s){
  return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function typeEmoji(type){
  return {"האכלה":"🍼","פיפי":"💧","קקי":"💩","ויטמינים":"💊"}[type]||"•";
}
function getDayName(dateStr){
  const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const d = new Date(dateStr + 'T12:00:00');
  return days[d.getDay()] || '';
}
function formatTopDate(value){
  const normalized = normalizeDateStr(value);
  if(!normalized) return '—';
  const [y,m,d] = normalized.split('-');
  return `${d}/${m}/${y}`;
}
function updateTopDate(){
  const value = document.getElementById('logDate').value;
  document.getElementById('topDateText').textContent = formatTopDate(value);
}
function updateSelectedDayBox(){
  const value = normalizeDateStr(document.getElementById('logDate').value);
  document.getElementById('selectedDayLabel').textContent = formatTopDate(value);
  document.getElementById('selectedDaySub').textContent = value ? `יום ${getDayName(value)}` : '—';
}
function shiftDateByDays(dateStr, days){
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + days);
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off*60000).toISOString().slice(0,10);
}
function goToPrevDay(){
  const input = document.getElementById('logDate');
  input.value = shiftDateByDays(normalizeDateStr(input.value), -1);
  render();
}
function goToNextDay(){
  const input = document.getElementById('logDate');
  input.value = shiftDateByDays(normalizeDateStr(input.value), 1);
  render();
}
function getDeviceId(){
  let id=localStorage.getItem(DEVICE_KEY);
  if(!id){
    id='dev_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
    localStorage.setItem(DEVICE_KEY,id);
  }
  return id;
}
function loadState(){
  try{
    const data=JSON.parse(localStorage.getItem(STORAGE_KEY));
    return data&&Array.isArray(data.entries)?data:{entries:[]};
  }catch{
    return {entries:[]};
  }
}
function saveState(state){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}
function loadSyncMeta(){
  try{return JSON.parse(localStorage.getItem(SYNC_KEY))||{};}catch{return {};}
}
function saveSyncMeta(meta){
  localStorage.setItem(SYNC_KEY,JSON.stringify(meta));
}
function normalizeDateStr(value){
  if(!value) return '';
  if(typeof value==='string'){
    if(/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
    if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(value)){
      const [d,m,y]=value.split('/');
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
    if(/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(value)){
      const [d,m,y]=value.split('.');
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
    const parsed=new Date(value);
    if(!isNaN(parsed)){
      const off=parsed.getTimezoneOffset();
      return new Date(parsed.getTime()-off*60000).toISOString().slice(0,10);
    }
  }
  if(Object.prototype.toString.call(value)==='[object Date]' && !isNaN(value)){
    const off=value.getTimezoneOffset();
    return new Date(value.getTime()-off*60000).toISOString().slice(0,10);
  }
  return '';
}
function normalizeTimeStr(value){
  if(value===null||value===undefined||value==='') return '';
  if(Object.prototype.toString.call(value)==='[object Date]' && !isNaN(value)){
    return value.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
  }
  if(typeof value==='number' && isFinite(value)){
    const totalMinutes=Math.round((value%1)*24*60);
    const hh=String(Math.floor(totalMinutes/60)%24).padStart(2,'0');
    const mm=String(totalMinutes%60).padStart(2,'0');
    return `${hh}:${mm}`;
  }
  const s=String(value).trim();
  if(!s) return '';
  if(/^\d{2}:\d{2}$/.test(s)) return s;
  if(/^\d{2}:\d{2}:\d{2}$/.test(s)) return s.slice(0,5);
  const parsed=new Date(s);
  if(!isNaN(parsed)){
    return parsed.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
  }
  const match=s.match(/(\d{1,2}):(\d{2})/);
  if(match){
    return `${String(match[1]).padStart(2,'0')}:${match[2]}`;
  }
  return '';
}
function isDeletedValue(value){
  return value===true || String(value).toLowerCase()==='true';
}
function normalizeEntry(raw){
  return {
    id:String(raw.id||''),
    createdAt:String(raw.createdAt||raw.updatedAt||nowIso()),
    updatedAt:String(raw.updatedAt||raw.createdAt||nowIso()),
    date:normalizeDateStr(raw.date),
    time:normalizeTimeStr(raw.time),
    type:String(raw.type||''),
    amount:raw.amount===null||raw.amount===undefined?'':String(raw.amount),
    note:'',
    device:String(raw.device||''),
    deleted:isDeletedValue(raw.deleted)
  };
}
function getEntriesForDay(date){
  const state=loadState();
  return state.entries
    .map(normalizeEntry)
    .filter(e => !e.deleted && normalizeDateStr(e.date)===normalizeDateStr(date))
    .sort((a,b)=>(b.time||'').localeCompare(a.time||''));
}
function setBusy(flag){
  busy=flag;
  const saveBtn=document.getElementById('saveBtn');
  if(saveBtn) saveBtn.disabled=flag;
}
function setStatus(text,kind,metaText){
  const el=document.getElementById('syncStatus');
  const meta=document.getElementById('syncMeta');
  el.textContent=text;
  el.className=`status-pill ${kind}`;
  meta.textContent=metaText||'';
}
function setSoftMessage(message){
  saveSyncMeta({
    ...loadSyncMeta(),
    lastError: message || ''
  });
  updateSyncStatus();
}
function updateSyncStatus(){
  const meta=loadSyncMeta();

  if(!navigator.onLine){
    setStatus('אופליין','status-warn','אין חיבור כרגע');
    return;
  }
  if(busy){
    setStatus('מעדכן','status-warn','שומר או טוען נתונים מהשרת');
    return;
  }
  if(meta.lastError){
    setStatus('שים לב','status-warn',meta.lastError);
    return;
  }

  const last=meta.lastSuccessAt?new Date(meta.lastSuccessAt).toLocaleString('he-IL'):'עדיין לא בוצע';
  setStatus('מסונכרן','status-ok',`עדכון אחרון: ${last}`);
}

function getLastEntryByType(entries, type){
  return entries.find(e => e.type === type) || null;
}

function updateNowCards(entries){
  const lastFeed = getLastEntryByType(entries, 'האכלה');
  const lastPee = getLastEntryByType(entries, 'פיפי');
  const lastPoop = getLastEntryByType(entries, 'קקי');
  const hasVitamins = entries.some(e => e.type === 'ויטמינים');

  document.getElementById('lastFeedValue').textContent = lastFeed ? `${lastFeed.time}${lastFeed.amount ? ` · ${lastFeed.amount} מ״ל` : ''}` : '—';
  document.getElementById('lastPeeValue').textContent = lastPee ? lastPee.time : '—';
  document.getElementById('lastPoopValue').textContent = lastPoop ? lastPoop.time : '—';
  document.getElementById('lastVitaminValue').textContent = hasVitamins ? 'ניתן' : 'לא ניתן';

  const vitaminCard = document.getElementById('lastVitaminCard');
  vitaminCard.classList.remove('on','off');
  vitaminCard.classList.add(hasVitamins ? 'on' : 'off');
}

function updateVitaminSummary(entries){
  const hasVitamins = entries.some(e => e.type === 'ויטמינים');
  const vitaminStat = document.getElementById('vitaminStat');
  const vitaminIcon = document.getElementById('vitaminIcon');

  vitaminStat.classList.remove('on','off');
  vitaminStat.classList.add(hasVitamins ? 'on' : 'off');
  vitaminIcon.textContent = hasVitamins ? '✓' : '○';
}

function render(){
  updateTopDate();
  updateSelectedDayBox();

  const date=document.getElementById('logDate').value;
  const entries=getEntriesForDay(date);
  const box=document.getElementById('entries');

  if(!entries.length){
    box.innerHTML='<div class="muted">עדיין אין רישומים ליום הזה.</div>';
  }else{
    box.innerHTML=entries.map(e=>`
      <div class="entry-row">
        <div class="entry-time">${esc(e.time||'')}</div>
        <div class="entry-main">
          <div class="entry-topline">
            <span class="entry-type">${typeEmoji(e.type)} ${esc(e.type)}</span>
          </div>
          <div class="entry-amount">${e.amount ? `כמות: ${esc(e.amount)} מ״ל` : 'ללא כמות'}</div>
        </div>
        <div class="entry-actions">
          <button class="mini-btn" type="button" onclick="editEntry('${e.id}')">עריכה</button>
          <button class="mini-btn delete" type="button" onclick="deleteEntry('${e.id}')">מחיקה</button>
        </div>
      </div>`).join('');
  }

  const feedEntries=entries.filter(e=>e.type==='האכלה');
  document.getElementById('feedCount').textContent=feedEntries.length;
  document.getElementById('feedMl').textContent=feedEntries.reduce((s,e)=>s+Number(e.amount||0),0);
  document.getElementById('peeCount').textContent=entries.filter(e=>e.type==='פיפי').length;
  document.getElementById('poopCount').textContent=entries.filter(e=>e.type==='קקי').length;

  updateVitaminSummary(entries);
  updateNowCards(entries);
  updateSyncStatus();
}

function replaceAllEntries(entries){
  saveState({entries:entries.map(normalizeEntry).filter(e=>!e.deleted)});
}
function addOrReplaceLocalEntry(entry){
  const state = loadState();
  const normalized = normalizeEntry(entry);
  const map = new Map(state.entries.map(e => [normalizeEntry(e).id, normalizeEntry(e)]));
  map.set(normalized.id, normalized);
  saveState({ entries: Array.from(map.values()).filter(e => !e.deleted) });
}
function removeLocalEntry(id){
  const state = loadState();
  saveState({
    entries: state.entries
      .map(normalizeEntry)
      .filter(e => e.id !== id)
  });
}
function makeEntry({date,time,type,amount}){
  const ts=nowIso();
  return {
    id:'entry_'+Math.random().toString(36).slice(2)+Date.now().toString(36),
    createdAt:ts,
    updatedAt:ts,
    date:normalizeDateStr(date),
    time:normalizeTimeStr(time||nowTime()),
    type:type||'',
    amount:type==='האכלה'?String(amount||''):'',
    note:'',
    device:getDeviceId(),
    deleted:false
  };
}
document.querySelectorAll('#typeChips .chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('#typeChips .chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentType=chip.dataset.type;
    const amount=document.getElementById('amount');
    amount.disabled=currentType!=='האכלה';
    if(currentType!=='האכלה') amount.value='';
  });
});
async function apiGetAll(){
  const url=`${API_URL}?token=${encodeURIComponent(API_TOKEN)}&_=${Date.now()}`;
  const res=await fetch(url,{method:'GET',cache:'no-store'});
  return res.json();
}
async function apiSave(entry){
  const res=await fetch(API_URL,{
    method:'POST',
    cache:'no-store',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:API_TOKEN,action:'save',entry})
  });
  return res.json();
}
async function apiDelete(id){
  const res=await fetch(API_URL,{
    method:'POST',
    cache:'no-store',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:API_TOKEN,action:'delete',id})
  });
  return res.json();
}
async function loadFromServer(){
  const result=await apiGetAll();
  if(!result.ok) throw new Error(result.error||'Failed to fetch');
  const entries=(result.data||[]).map(normalizeEntry).filter(e=>!e.deleted);
  replaceAllEntries(entries);
  saveSyncMeta({lastSuccessAt:nowIso(),lastError:''});
}
async function loadFromServerWithRetry(retries = 3, delayMs = 1200){
  let lastError = null;
  for(let i = 0; i < retries; i++){
    try{
      await loadFromServer();
      return true;
    }catch(err){
      lastError = err;
      if(i < retries - 1){
        await new Promise(resolve => setTimeout(resolve, delayMs));
      }
    }
  }
  throw lastError;
}
function refreshInBackground(){
  setTimeout(async () => {
    try{
      await loadFromServerWithRetry(3, 1200);
      saveSyncMeta({ lastSuccessAt: nowIso(), lastError: '' });
      render();
    }catch(err){
      saveSyncMeta({
        ...loadSyncMeta(),
        lastError: 'הרענון מהשרת התעכב, אבל הפעולה נשמרה'
      });
      render();
    }
  }, 400);
}
async function addEntry(){
  if(busy) return;

  if(!navigator.onLine){
    alert('אין חיבור כרגע. נסה שוב כשהאינטרנט חוזר.');
    return;
  }

  const entry = makeEntry({
    date: document.getElementById('logDate').value,
    time: document.getElementById('time').value,
    type: currentType,
    amount: document.getElementById('amount').value
  });

  addOrReplaceLocalEntry(entry);
  document.getElementById('amount').value='';
  document.getElementById('time').value=nowTime();
  render();

  try{
    setBusy(true);
    updateSyncStatus();

    const result = await apiSave(entry);

    if(result && result.ok){
      saveSyncMeta({ lastSuccessAt: nowIso(), lastError: '' });
      refreshInBackground();
      return;
    }

    setSoftMessage('הפעולה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }catch(err){
    setSoftMessage('הפעולה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }finally{
    setBusy(false);
    updateSyncStatus();
  }
}
function findEntryById(id){
  return loadState().entries.map(normalizeEntry).find(e=>e.id===id);
}
async function deleteEntry(id){
  if(busy) return;

  if(!navigator.onLine){
    alert('אין חיבור כרגע. נסה שוב כשהאינטרנט חוזר.');
    return;
  }

  removeLocalEntry(id);
  render();

  try{
    setBusy(true);
    updateSyncStatus();

    const result = await apiDelete(id);

    if(result && result.ok){
      saveSyncMeta({ lastSuccessAt: nowIso(), lastError: '' });
      refreshInBackground();
      return;
    }

    setSoftMessage('המחיקה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }catch(err){
    setSoftMessage('המחיקה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }finally{
    setBusy(false);
    updateSyncStatus();
  }
}
function editEntry(id){
  const e=findEntryById(id);
  if(!e) return;

  currentType=e.type;
  document.querySelectorAll('#typeChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.type===e.type));
  document.getElementById('time').value=e.time||'';
  document.getElementById('amount').value=e.amount||'';

  const amount=document.getElementById('amount');
  amount.disabled=currentType!=='האכלה';

  deleteEntry(id);
}
async function clearDay(){
  const date = document.getElementById('logDate').value;
  const entries = getEntriesForDay(date);

  if(!entries.length) return;
  if(!confirm('למחוק את כל הרישומים של היום הזה?')) return;

  if(!navigator.onLine){
    alert('אין חיבור כרגע. נסה שוב כשהאינטרנט חוזר.');
    return;
  }

  entries.forEach(entry => removeLocalEntry(entry.id));
  render();

  try{
    setBusy(true);
    updateSyncStatus();

    for(const entry of entries){
      await apiDelete(entry.id);
    }

    saveSyncMeta({ lastSuccessAt: nowIso(), lastError: '' });
    refreshInBackground();
  }catch(err){
    setSoftMessage('מחיקת היום נשלחה, בודק מול השרת...');
    refreshInBackground();
  }finally{
    setBusy(false);
    updateSyncStatus();
  }
}
function exportJson(){
  const blob=new Blob([JSON.stringify(loadState(),null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='baby-tracker-backup.json';
  a.click();
}
async function manualRefresh(){
  if(busy) return;

  if(!navigator.onLine){
    updateSyncStatus();
    return;
  }

  try{
    setBusy(true);
    updateSyncStatus();
    await loadFromServerWithRetry(3, 1200);
    saveSyncMeta({ lastSuccessAt: nowIso(), lastError: '' });
  }catch(err){
    saveSyncMeta({ ...loadSyncMeta(), lastError: 'הרענון מהשרת נכשל זמנית' });
  }finally{
    setBusy(false);
    render();
  }
}

document.getElementById('logDate').value=getTodayStr();
updateTopDate();
updateSelectedDayBox();
document.getElementById('time').value=nowTime();

render();
manualRefresh();

setInterval(manualRefresh,10000);
window.addEventListener('online',manualRefresh);
window.addEventListener('focus',manualRefresh);

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js?v=21').catch(()=>{});
}
</script>
