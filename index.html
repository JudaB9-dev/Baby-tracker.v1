<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#eef4fb" />
  <title>מעקב תינוק</title>
  <link rel="manifest" href="manifest.json?v=25" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    :root{
      --bg:#eef4fb;
      --bg2:#f6f9fe;
      --card:#ffffff;
      --line:#dde6f2;
      --line-soft:#e8eef6;
      --text:#1f2b46;
      --muted:#8392a7;
      --blue:#73a8f2;
      --blue-dark:#4e8fe3;
      --blue-soft:#e7f0ff;
      --green-bg:#eff8f0;
      --green-text:#2f9649;
      --green-dot:#2ec35b;
      --red-bg:#fdf0f0;
      --red-text:#b34a4a;
      --shadow:0 10px 28px rgba(67,97,142,.08);
      --radius-xl:34px;
      --radius-lg:28px;
      --radius-md:22px;
      --radius-sm:18px;
    }

    *{box-sizing:border-box}
    html,body{overflow-x:hidden}
    html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    body{
      margin:0;
      font-family:-apple-system,"SF Pro Display","SF Pro Text",BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, #f8fbff 0%, transparent 22%),
        linear-gradient(180deg,#edf4fb 0%,#f4f8fd 58%,#f8fbff 100%);
      -webkit-text-size-adjust:100%;
    }

    .wrap{
      max-width:940px;
      margin:0 auto;
      padding:18px 14px 30px;
    }

    .stack{display:grid;gap:18px}

    .hero{
      background:rgba(255,255,255,.56);
      backdrop-filter:blur(10px);
      border:1px solid #edf2fa;
      border-radius:34px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .hero-top{
      display:grid;
      grid-template-columns:176px 1fr 92px;
      gap:16px;
      align-items:center;
      margin-bottom:16px;
    }

    .sync-card{
      background:#fff;
      border:1px solid var(--line-soft);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:14px;
      min-height:106px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .sync-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }

    .sync-title{
      font-size:13px;
      color:var(--muted);
      font-weight:500;
    }

    .refresh-btn{
      width:42px;
      height:42px;
      border-radius:15px;
      border:1px solid var(--line);
      background:#fff;
      color:#3f84e3;
      font-size:22px;
      line-height:1;
      cursor:pointer;
      box-shadow:0 4px 12px rgba(78,143,227,.08);
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:800;
      line-height:1;
      width:max-content;
      max-width:100%;
    }

    .status-ok{
      background:var(--green-bg);
      color:var(--green-text);
    }

    .status-warn{
      background:#fff4df;
      color:#9a6c15;
    }

    .status-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:currentColor;
      flex:0 0 auto;
    }

    .sync-meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.25;
    }

    .title-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:nowrap;
      text-align:center;
      min-height:72px;
      white-space:nowrap;
    }

    h1{
      margin:0;
      font-size:33px;
      line-height:1;
      font-weight:900;
      letter-spacing:-0.04em;
      color:#1f2b46;
    }

    .title-emoji{
      font-size:36px;
      line-height:1;
    }

    .hero-photo{
      justify-self:end;
    }

    .hero-photo img{
      width:86px;
      height:86px;
      object-fit:cover;
      border-radius:24px;
      border:4px solid #fff;
      box-shadow:var(--shadow);
      background:#eef4fb;
    }

    .date-card{
      background:#fff;
      border:1px solid var(--line-soft);
      border-radius:32px;
      padding:24px 16px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    .date-label{
      font-size:16px;
      color:var(--muted);
      margin-bottom:10px;
    }

    .date-value{
      font-size:48px;
      font-weight:900;
      line-height:1;
      letter-spacing:-0.04em;
      color:#000;
    }

    .date-sub{
      margin-top:12px;
      font-size:16px;
      color:var(--muted);
    }

    .card{
      background:#fff;
      border:1px solid #edf2fa;
      border-radius:32px;
      padding:22px;
      box-shadow:var(--shadow);
    }

    .card-title{
      margin:0 0 18px;
      font-size:28px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:-0.03em;
      color:#1f2b46;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:14px;
    }

    .stat{
      min-height:138px;
      border:1px solid var(--line);
      border-radius:28px;
      background:#fff;
      padding:16px 8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .stat b{
      font-size:34px;
      line-height:1;
      margin-bottom:8px;
      font-weight:900;
      color:#1f2b46;
    }

    .stat span{
      font-size:14px;
      color:var(--muted);
      line-height:1.2;
      margin-bottom:10px;
    }

    .stat-icon{
      font-size:34px;
      line-height:1;
    }

    .vitamin-stat.off{
      background:linear-gradient(180deg,#fff4f4 0%,#fdeaea 100%);
      border-color:#f2d0d0;
    }

    .vitamin-stat.off b,
    .vitamin-stat.off span{
      color:var(--red-text);
    }

    .vitamin-stat.on{
      background:linear-gradient(180deg,#eef9f0 0%,#e2f4e6 100%);
      border-color:#d4e9d8;
    }

    .vitamin-stat.on b,
    .vitamin-stat.on span{
      color:var(--green-text);
    }

    .chips{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .chip{
      min-height:72px;
      border:1px solid var(--line);
      border-radius:24px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 8px;
      font-size:18px;
      font-weight:500;
      color:#1f2b46;
      cursor:pointer;
      user-select:none;
      text-align:center;
      transition:.18s ease;
      box-shadow:0 1px 0 rgba(255,255,255,.7) inset;
    }

    .chip.active{
      background:linear-gradient(180deg,#dde9fb 0%,#d2e2fb 100%);
      border-color:#bfd4f1;
      color:#3a78c7;
      font-weight:700;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-bottom:18px;
    }

    .field label{
      display:block;
      margin:0 0 8px;
      font-size:16px;
      color:var(--muted);
    }

    input,button{font:inherit}

    input[type="time"],input[type="number"]{
      width:100%;
      height:66px;
      border-radius:22px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 18px;
      text-align:center;
      font-size:22px;
      color:#1f2b46;
      outline:none;
      appearance:none;
      -webkit-appearance:none;
      box-shadow:0 1px 0 rgba(255,255,255,.7) inset;
    }

    input[type="time"]:focus,
    input[type="number"]:focus{
      border-color:#bfd5f2;
      box-shadow:0 0 0 4px rgba(115,168,242,.12);
    }

    input[type="number"]::placeholder{
      color:#c1cad8;
    }

    input[type="number"]:disabled{
      background:#fafcff;
      color:#b8c2d1;
    }

    .save-row{
      display:flex;
      justify-content:flex-start;
    }

    .primary-btn{
      width:100%;
      height:68px;
      border:0;
      border-radius:22px;
      background:linear-gradient(180deg,var(--blue) 0%,var(--blue-dark) 100%);
      color:#fff;
      font-size:24px;
      font-weight:900;
      letter-spacing:-0.01em;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(78,143,227,.20);
    }

    .primary-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .day-nav{
      display:grid;
      grid-template-columns:1fr 1.9fr 1fr;
      gap:14px;
      margin-bottom:18px;
    }

    .nav-btn,
    .day-center{
      min-height:82px;
      border-radius:22px;
      border:1px solid var(--line);
      background:#fff;
    }

    .nav-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#4a82d4;
      font-size:22px;
      cursor:pointer;
    }

    .day-center{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:10px;
      text-align:center;
    }

    .day-center-main{
      font-size:22px;
      font-weight:700;
      color:#202c46;
      line-height:1.1;
    }

    .day-center-sub{
      font-size:14px;
      color:var(--muted);
      margin-top:6px;
    }

    .entries-table{
      display:grid;
      gap:14px;
    }

    .entry-card{
      border:1px solid var(--line);
      border-radius:24px;
      background:#fff;
      padding:16px;
    }

    .entry-head{
      display:grid;
      grid-template-columns:110px 1fr 110px;
      gap:12px;
      align-items:center;
      direction:ltr;
    }

    .entry-amount,
    .entry-type-wrap,
    .entry-time{
      text-align:center;
    }

    .entry-time{
      font-size:28px;
      font-weight:900;
      color:#1f2b46;
      line-height:1;
    }

    .entry-type{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:8px 14px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#f8fbff;
      font-size:18px;
      margin-bottom:8px;
      width:max-content;
      max-width:100%;
    }

    .entry-type-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-width:0;
    }

    .entry-sub{
      font-size:17px;
      color:var(--muted);
      line-height:1.25;
    }

    .entry-actions{
      display:flex;
      gap:10px;
      justify-content:flex-start;
      margin-top:14px;
      flex-wrap:wrap;
    }

    .mini-btn{
      min-width:132px;
      height:52px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      color:#4981d3;
      font-size:20px;
      cursor:pointer;
    }

    .mini-btn.delete{
      background:#fff1f1;
      color:var(--red-text);
      border-color:#f3d1d1;
    }

    .bottom-tools{
      display:grid;
      gap:12px;
    }

    .wide-btn{
      height:58px;
      border-radius:20px;
      border:1px solid var(--line);
      background:#fff;
      color:#4981d3;
      font-size:22px;
      cursor:pointer;
    }

    .wide-btn.danger{
      background:#fff1f1;
      color:var(--red-text);
      border-color:#f3d1d1;
    }

    .muted{
      color:var(--muted);
      font-size:14px;
    }

    .footer-note{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding:2px 4px 0;
    }

    @media (max-width:640px){
      .wrap{
        padding:12px 10px 26px;
      }

      .hero{
        padding:14px;
        border-radius:28px;
      }

      .hero-top{
        grid-template-columns:120px 1fr 70px;
        gap:10px;
        margin-bottom:12px;
      }

      .sync-card{
        padding:10px;
        border-radius:20px;
        min-height:92px;
      }

      .sync-title{
        font-size:11px;
      }

      .refresh-btn{
        width:34px;
        height:34px;
        border-radius:12px;
        font-size:18px;
      }

      .status-pill{
        font-size:12px;
        padding:8px 10px;
      }

      .sync-meta{
        font-size:11px;
      }

      .title-wrap{
        min-height:58px;
        gap:6px;
      }

      h1{
        font-size:31px;
      }

      .title-emoji{
        font-size:30px;
      }

      .hero-photo img{
        width:64px;
        height:64px;
        border-radius:18px;
      }

      .date-card{
        padding:18px 10px;
        border-radius:24px;
      }

      .date-label{
        font-size:14px;
        margin-bottom:8px;
      }

      .date-value{
        font-size:30px;
      }

      .date-sub{
        font-size:13px;
        margin-top:8px;
      }

      .card{
        padding:14px;
        border-radius:28px;
      }

      .card-title{
        font-size:24px;
        margin-bottom:14px;
      }

      .stats{
        gap:8px;
      }

      .stat{
        min-height:98px;
        border-radius:20px;
        padding:10px 4px;
      }

      .stat b{
        font-size:20px;
        margin-bottom:6px;
      }

      .stat span{
        font-size:10px;
        margin-bottom:6px;
      }

      .stat-icon{
        font-size:24px;
      }

      .chips{
        gap:8px;
      }

      .chip{
        min-height:56px;
        border-radius:18px;
        font-size:15px;
        gap:6px;
        padding:8px 4px;
      }

      .form-grid{
        grid-template-columns:1fr 1fr;
        gap:12px;
      }

      .field label{
        font-size:14px;
      }

      input[type="time"],input[type="number"]{
        height:58px;
        border-radius:18px;
        font-size:20px;
      }

      .primary-btn{
        height:60px;
        border-radius:20px;
        font-size:20px;
      }

      .day-nav{
        grid-template-columns:1fr 1.35fr 1fr;
        gap:8px;
      }

      .nav-btn,
      .day-center{
        min-height:68px;
        border-radius:18px;
      }

      .nav-btn{
        font-size:16px;
        padding:0 6px;
      }

      .day-center-main{
        font-size:18px;
      }

      .day-center-sub{
        font-size:11px;
        margin-top:4px;
      }

      .entry-card{
        padding:14px;
        border-radius:20px;
      }

      .entry-head{
        grid-template-columns:84px 1fr 84px;
        gap:8px;
      }

      .entry-time{
        font-size:24px;
      }

      .entry-type{
        font-size:16px;
        padding:6px 12px;
        margin-bottom:6px;
      }

      .entry-sub{
        font-size:15px;
      }

      .entry-actions{
        margin-top:12px;
      }

      .mini-btn{
        min-width:104px;
        height:46px;
        border-radius:16px;
        font-size:16px;
      }

      .wide-btn{
        height:52px;
        border-radius:18px;
        font-size:18px;
      }

      .muted{
        font-size:13px;
      }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-top">
      <div class="sync-card">
        <div class="sync-row">
          <div class="sync-title">סנכרון</div>
          <button class="refresh-btn" type="button" onclick="manualRefresh()" aria-label="רענון">↻</button>
        </div>
        <div id="syncStatus" class="status-pill status-warn">
          <span class="status-dot"></span>
          טוען...
        </div>
        <div id="syncMeta" class="sync-meta">מכין נתונים</div>
      </div>

      <div class="title-wrap">
        <span class="title-emoji">👶</span>
        <h1>מעקב תינוק</h1>
      </div>

      <div class="hero-photo">
        <img src="icon-192.png" alt="תינוק" />
      </div>
    </div>

    <div class="date-card">
      <div class="date-label">תאריך</div>
      <div id="topDateText" class="date-value">—</div>
      <div id="topDateSub" class="date-sub">—</div>
    </div>
  </div>

  <div class="stack">
    <section class="card">
      <h2 class="card-title">סיכום יומי</h2>
      <div class="stats">
        <div class="stat vitamin-stat off" id="vitaminStat">
          <b id="vitaminIcon">○</b>
          <span>ויטמינים</span>
          <div class="stat-icon">💊</div>
        </div>
        <div class="stat">
          <b id="poopCount">0</b>
          <span>קקי</span>
          <div class="stat-icon">💩</div>
        </div>
        <div class="stat">
          <b id="peeCount">0</b>
          <span>פיפי</span>
          <div class="stat-icon">💧</div>
        </div>
        <div class="stat">
          <b id="feedMl">0</b>
          <span>מ״ל סה״כ</span>
          <div class="stat-icon">🧴</div>
        </div>
        <div class="stat">
          <b id="feedCount">0</b>
          <span>האכלות</span>
          <div class="stat-icon">🍼</div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="card-title">רישום חדש</h2>

      <input id="logDate" type="date" style="display:none" />

      <div id="typeChips" class="chips">
        <div class="chip active" data-type="האכלה">האכלה 🍼</div>
        <div class="chip" data-type="פיפי">פיפי 💧</div>
        <div class="chip" data-type="קקי">קקי 💩</div>
        <div class="chip" data-type="ויטמינים">ויטמינים 💊</div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label for="amount">כמות (מ״ל)</label>
          <input id="amount" type="number" placeholder="למשל 90" />
        </div>
        <div class="field">
          <label for="time">שעה</label>
          <input id="time" type="time" />
        </div>
      </div>

      <div class="save-row">
        <button id="saveBtn" class="primary-btn" type="button" onclick="addEntry()">שמור רישום</button>
      </div>
    </section>

    <section class="card">
      <h2 class="card-title">רישומים של היום</h2>

      <div class="day-nav">
        <button class="nav-btn" type="button" onclick="goToNextDay()">◀ יום הבא</button>
        <div class="day-center">
          <div id="selectedDayLabel" class="day-center-main">—</div>
          <div id="selectedDaySub" class="day-center-sub">—</div>
        </div>
        <button class="nav-btn" type="button" onclick="goToPrevDay()">יום קודם ▶</button>
      </div>

      <div id="entries" class="entries-table"></div>
    </section>

    <section class="card">
      <div class="bottom-tools">
        <button class="wide-btn" type="button" onclick="exportJson()">ייצוא גיבוי</button>
        <button class="wide-btn danger" type="button" onclick="clearDay()">נקה יום זה</button>
      </div>
    </section>
  </div>

  <div class="footer-note">הרשימה מוצגת מהשעה החדשה לישנה, ואפשר לעבור בין ימים.</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby5HlpD17IG1p217ot4kwuErP4BtVZPa92H9uNQWD3JnkYCBlHyRX0FR7c0eMA1mdVGfw/exec';
const API_TOKEN = 'bt_7Fh29KqP4mX9Za81JrT6UvN2LsQ0';
const STORAGE_KEY = 'baby-tracker-v24-state';
const DEVICE_KEY = 'baby-tracker-v24-device';
const SYNC_KEY = 'baby-tracker-v24-sync-meta';

let currentType = 'האכלה';
let busy = false;

function getTodayStr(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0,10);
}
function nowTime(){
  return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
}
function nowIso(){
  return new Date().toISOString();
}
function typeEmoji(type){
  return {"האכלה":"🍼","פיפי":"💧","קקי":"💩","ויטמינים":"💊"}[type] || "•";
}
function esc(s){
  return String(s || '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function getDayName(dateStr){
  const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const d = new Date(dateStr + 'T12:00:00');
  return days[d.getDay()] || '';
}
function normalizeDateStr(value){
  if(!value) return '';
  if(typeof value === 'string'){
    if(/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
    if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(value)){
      const [d,m,y] = value.split('/');
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
    if(/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(value)){
      const [d,m,y] = value.split('.');
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
    const parsed = new Date(value);
    if(!isNaN(parsed)){
      const off = parsed.getTimezoneOffset();
      return new Date(parsed.getTime() - off * 60000).toISOString().slice(0,10);
    }
  }
  if(Object.prototype.toString.call(value) === '[object Date]' && !isNaN(value)){
    const off = value.getTimezoneOffset();
    return new Date(value.getTime() - off * 60000).toISOString().slice(0,10);
  }
  return '';
}
function normalizeTimeStr(value){
  if(value === null || value === undefined || value === '') return '';
  if(Object.prototype.toString.call(value) === '[object Date]' && !isNaN(value)){
    return value.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
  }
  if(typeof value === 'number' && isFinite(value)){
    const totalMinutes = Math.round((value % 1) * 24 * 60);
    const hh = String(Math.floor(totalMinutes / 60) % 24).padStart(2,'0');
    const mm = String(totalMinutes % 60).padStart(2,'0');
    return `${hh}:${mm}`;
  }
  const s = String(value).trim();
  if(!s) return '';
  if(/^\d{2}:\d{2}$/.test(s)) return s;
  if(/^\d{2}:\d{2}:\d{2}$/.test(s)) return s.slice(0,5);
  const parsed = new Date(s);
  if(!isNaN(parsed)){
    return parsed.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
  }
  const match = s.match(/(\d{1,2}):(\d{2})/);
  if(match){
    return `${String(match[1]).padStart(2,'0')}:${match[2]}`;
  }
  return '';
}
function isDeletedValue(value){
  return value === true || String(value).toLowerCase() === 'true';
}
function normalizeEntry(raw){
  return {
    id: String(raw.id || ''),
    createdAt: String(raw.createdAt || raw.updatedAt || nowIso()),
    updatedAt: String(raw.updatedAt || raw.createdAt || nowIso()),
    date: normalizeDateStr(raw.date),
    time: normalizeTimeStr(raw.time),
    type: String(raw.type || ''),
    amount: raw.amount === null || raw.amount === undefined ? '' : String(raw.amount),
    note: '',
    device: String(raw.device || ''),
    deleted: isDeletedValue(raw.deleted)
  };
}
function loadState(){
  try{
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return data && Array.isArray(data.entries) ? data : {entries:[]};
  }catch{
    return {entries:[]};
  }
}
function saveState(state){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function loadSyncMeta(){
  try{return JSON.parse(localStorage.getItem(SYNC_KEY)) || {};}catch{return {};}
}
function saveSyncMeta(meta){
  localStorage.setItem(SYNC_KEY, JSON.stringify(meta));
}
function getDeviceId(){
  let id = localStorage.getItem(DEVICE_KEY);
  if(!id){
    id = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem(DEVICE_KEY, id);
  }
  return id;
}
function getEntriesForDay(date){
  const state = loadState();
  return state.entries
    .map(normalizeEntry)
    .filter(e => !e.deleted && normalizeDateStr(e.date) === normalizeDateStr(date))
    .sort((a,b)=>(b.time || '').localeCompare(a.time || ''));
}
function formatTopDate(value){
  const normalized = normalizeDateStr(value);
  if(!normalized) return '—';
  const [y,m,d] = normalized.split('-');
  return `${d}/${m}/${y}`;
}
function updateTopDate(){
  const value = normalizeDateStr(document.getElementById('logDate').value);
  document.getElementById('topDateText').textContent = formatTopDate(value);
  document.getElementById('topDateSub').textContent = value ? `יום ${getDayName(value)}` : '—';
}
function updateSelectedDayBox(){
  const value = normalizeDateStr(document.getElementById('logDate').value);
  document.getElementById('selectedDayLabel').textContent = formatTopDate(value);
  document.getElementById('selectedDaySub').textContent = value ? `יום ${getDayName(value)}` : '—';
}
function shiftDateByDays(dateStr, days){
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + days);
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0,10);
}
function goToPrevDay(){
  const input = document.getElementById('logDate');
  input.value = shiftDateByDays(normalizeDateStr(input.value), -1);
  render();
}
function goToNextDay(){
  const input = document.getElementById('logDate');
  input.value = shiftDateByDays(normalizeDateStr(input.value), 1);
  render();
}
function setBusy(flag){
  busy = flag;
  const saveBtn = document.getElementById('saveBtn');
  if(saveBtn) saveBtn.disabled = flag;
}
function formatSyncStamp(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d)) return '—';
  return d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
}
function setStatus(text, kind, metaText){
  const el = document.getElementById('syncStatus');
  const meta = document.getElementById('syncMeta');
  el.innerHTML = `<span class="status-dot"></span>${text}`;
  el.className = `status-pill ${kind}`;
  meta.textContent = metaText || '';
}
function setSoftMessage(message){
  saveSyncMeta({
    ...loadSyncMeta(),
    lastError: message || ''
  });
  updateSyncStatus();
}
function updateSyncStatus(){
  const meta = loadSyncMeta();

  if(!navigator.onLine){
    setStatus('אופליין','status-warn','אין חיבור');
    return;
  }
  if(busy){
    setStatus('מעדכן','status-warn','מסנכרן');
    return;
  }
  if(meta.lastError){
    setStatus('שים לב','status-warn','בודק שוב');
    return;
  }

  const last = formatSyncStamp(meta.lastSuccessAt);
  setStatus('מסונכרן','status-ok', last === '—' ? '—' : `עודכן ${last}`);
}
function updateVitaminSummary(entries){
  const hasVitamins = entries.some(e => e.type === 'ויטמינים');
  const vitaminStat = document.getElementById('vitaminStat');
  const vitaminIcon = document.getElementById('vitaminIcon');
  vitaminStat.classList.remove('on','off');
  vitaminStat.classList.add(hasVitamins ? 'on' : 'off');
  vitaminIcon.textContent = hasVitamins ? '✓' : '○';
}
function render(){
  updateTopDate();
  updateSelectedDayBox();

  const date = document.getElementById('logDate').value;
  const entries = getEntriesForDay(date);
  const box = document.getElementById('entries');

  if(!entries.length){
    box.innerHTML = '<div class="muted">עדיין אין רישומים ליום הזה.</div>';
  }else{
    box.innerHTML = entries.map(e=>`
      <div class="entry-card">
        <div class="entry-head">
          <div class="entry-amount">
            <div class="entry-sub">${e.amount ? `${esc(e.amount)} מ״ל` : 'ללא כמות'}</div>
          </div>

          <div class="entry-type-wrap">
            <div class="entry-type">${esc(e.type)} ${typeEmoji(e.type)}</div>
          </div>

          <div class="entry-time">${esc(e.time || '')}</div>
        </div>

        <div class="entry-actions">
          <button class="mini-btn delete" type="button" onclick="deleteEntry('${e.id}')">מחיקה</button>
          <button class="mini-btn" type="button" onclick="editEntry('${e.id}')">עריכה</button>
        </div>
      </div>
    `).join('');
  }

  const feedEntries = entries.filter(e => e.type === 'האכלה');
  document.getElementById('feedCount').textContent = feedEntries.length;
  document.getElementById('feedMl').textContent = feedEntries.reduce((s,e)=>s + Number(e.amount || 0), 0);
  document.getElementById('peeCount').textContent = entries.filter(e => e.type === 'פיפי').length;
  document.getElementById('poopCount').textContent = entries.filter(e => e.type === 'קקי').length;

  updateVitaminSummary(entries);
  updateSyncStatus();
}
function replaceAllEntries(entries){
  saveState({entries: entries.map(normalizeEntry).filter(e => !e.deleted)});
}
function addOrReplaceLocalEntry(entry){
  const state = loadState();
  const normalized = normalizeEntry(entry);
  const map = new Map(state.entries.map(e => [normalizeEntry(e).id, normalizeEntry(e)]));
  map.set(normalized.id, normalized);
  saveState({entries: Array.from(map.values()).filter(e => !e.deleted)});
}
function removeLocalEntry(id){
  const state = loadState();
  saveState({
    entries: state.entries.map(normalizeEntry).filter(e => e.id !== id)
  });
}
function makeEntry({date,time,type,amount}){
  const ts = nowIso();
  return {
    id:'entry_' + Math.random().toString(36).slice(2) + Date.now().toString(36),
    createdAt:ts,
    updatedAt:ts,
    date:normalizeDateStr(date),
    time:normalizeTimeStr(time || nowTime()),
    type:type || '',
    amount:type === 'האכלה' ? String(amount || '') : '',
    note:'',
    device:getDeviceId(),
    deleted:false
  };
}

document.querySelectorAll('#typeChips .chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('#typeChips .chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentType = chip.dataset.type;
    const amount = document.getElementById('amount');
    amount.disabled = currentType !== 'האכלה';
    if(currentType !== 'האכלה') amount.value = '';
  });
});

async function apiGetAll(){
  const url = `${API_URL}?token=${encodeURIComponent(API_TOKEN)}&_=${Date.now()}`;
  const res = await fetch(url,{method:'GET',cache:'no-store'});
  return res.json();
}
async function apiSave(entry){
  const res = await fetch(API_URL,{
    method:'POST',
    cache:'no-store',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:API_TOKEN,action:'save',entry})
  });
  return res.json();
}
async function apiDelete(id){
  const res = await fetch(API_URL,{
    method:'POST',
    cache:'no-store',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:API_TOKEN,action:'delete',id})
  });
  return res.json();
}
async function loadFromServer(){
  const result = await apiGetAll();
  if(!result.ok) throw new Error(result.error || 'Failed to fetch');
  const entries = (result.data || []).map(normalizeEntry).filter(e => !e.deleted);
  replaceAllEntries(entries);
  saveSyncMeta({lastSuccessAt:nowIso(),lastError:''});
}
async function loadFromServerWithRetry(retries = 3, delayMs = 1200){
  let lastError = null;
  for(let i=0;i<retries;i++){
    try{
      await loadFromServer();
      return true;
    }catch(err){
      lastError = err;
      if(i < retries - 1){
        await new Promise(resolve => setTimeout(resolve, delayMs));
      }
    }
  }
  throw lastError;
}
function refreshInBackground(){
  setTimeout(async()=>{
    try{
      await loadFromServerWithRetry(3,1200);
      saveSyncMeta({lastSuccessAt:nowIso(),lastError:''});
      render();
    }catch(err){
      saveSyncMeta({...loadSyncMeta(),lastError:'הרענון מהשרת התעכב, אבל הפעולה נשמרה'});
      render();
    }
  },400);
}
async function addEntry(){
  if(busy) return;

  if(!navigator.onLine){
    alert('אין חיבור כרגע. נסה שוב כשהאינטרנט חוזר.');
    return;
  }

  const entry = makeEntry({
    date: document.getElementById('logDate').value,
    time: document.getElementById('time').value,
    type: currentType,
    amount: document.getElementById('amount').value
  });

  addOrReplaceLocalEntry(entry);
  document.getElementById('amount').value = '';
  document.getElementById('time').value = nowTime();
  render();

  try{
    setBusy(true);
    updateSyncStatus();
    const result = await apiSave(entry);

    if(result && result.ok){
      saveSyncMeta({lastSuccessAt:nowIso(),lastError:''});
      refreshInBackground();
      return;
    }

    setSoftMessage('הפעולה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }catch(err){
    setSoftMessage('הפעולה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }finally{
    setBusy(false);
    updateSyncStatus();
  }
}
function findEntryById(id){
  return loadState().entries.map(normalizeEntry).find(e => e.id === id);
}
async function deleteEntry(id){
  if(busy) return;

  if(!navigator.onLine){
    alert('אין חיבור כרגע. נסה שוב כשהאינטרנט חוזר.');
    return;
  }

  removeLocalEntry(id);
  render();

  try{
    setBusy(true);
    updateSyncStatus();
    const result = await apiDelete(id);

    if(result && result.ok){
      saveSyncMeta({lastSuccessAt:nowIso(),lastError:''});
      refreshInBackground();
      return;
    }

    setSoftMessage('המחיקה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }catch(err){
    setSoftMessage('המחיקה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }finally{
    setBusy(false);
    updateSyncStatus();
  }
}
function editEntry(id){
  const e = findEntryById(id);
  if(!e) return;

  currentType = e.type;
  document.querySelectorAll('#typeChips .chip').forEach(c=>c.classList.toggle('active', c.dataset.type === e.type));
  document.getElementById('time').value = e.time || '';
  document.getElementById('amount').value = e.amount || '';

  const amount = document.getElementById('amount');
  amount.disabled = currentType !== 'האכלה';

  deleteEntry(id);
}
async function clearDay(){
  const date = document.getElementById('logDate').value;
  const entries = getEntriesForDay(date);

  if(!entries.length) return;
  if(!confirm('למחוק את כל הרישומים של היום הזה?')) return;

  if(!navigator.onLine){
    alert('אין חיבור כרגע. נסה שוב כשהאינטרנט חוזר.');
    return;
  }

  entries.forEach(entry => removeLocalEntry(entry.id));
  render();

  try{
    setBusy(true);
    updateSyncStatus();
    for(const entry of entries){
      await apiDelete(entry.id);
    }
    saveSyncMeta({lastSuccessAt:nowIso(),lastError:''});
    refreshInBackground();
  }catch(err){
    setSoftMessage('מחיקת היום נשלחה, בודק מול השרת...');
    refreshInBackground();
  }finally{
    setBusy(false);
    updateSyncStatus();
  }
}
function exportJson(){
  const blob = new Blob([JSON.stringify(loadState(),null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'baby-tracker-backup.json';
  a.click();
}
async function manualRefresh(){
  if(busy) return;

  if(!navigator.onLine){
    updateSyncStatus();
    return;
  }

  try{
    setBusy(true);
    updateSyncStatus();
    await loadFromServerWithRetry(3,1200);
    saveSyncMeta({lastSuccessAt:nowIso(),lastError:''});
  }catch(err){
    saveSyncMeta({...loadSyncMeta(),lastError:'הרענון מהשרת נכשל זמנית'});
  }finally{
    setBusy(false);
    render();
  }
}

document.getElementById('logDate').value = getTodayStr();
document.getElementById('time').value = nowTime();

updateTopDate();
updateSelectedDayBox();
render();
manualRefresh();

setInterval(manualRefresh,10000);
window.addEventListener('online',manualRefresh);
window.addEventListener('focus',manualRefresh);

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js?v=25').catch(()=>{});
}
</script>
