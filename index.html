<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8fb8e8" />
  <title>מעקב תינוק</title>
  <link rel="manifest" href="manifest.json?v=14" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{--card:#ffffff;--line:#dbe7f6;--primary:#8fb8e8;--primary2:#dfeeff;--text:#1e2a3a;--muted:#6e7a8a;--shadow:0 8px 24px rgba(32,62,100,.10);--radius:18px;--field-h:48px;--page-pad:14px;--ok:#e8f7ec;--ok-text:#1f6b36;--warn:#fff4df;--warn-text:#8a5a00;--err:#ffe8e8;--err-text:#8f2424}
    *{box-sizing:border-box} html,body{overflow-x:hidden}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#edf5ff 0%,#f7fbff 45%,#ffffff 100%);color:var(--text);-webkit-text-size-adjust:100%}
    .wrap{max-width:760px;margin:0 auto;padding:var(--page-pad) var(--page-pad) 42px}
    .hero{display:grid;grid-template-columns:84px 1fr;gap:14px;align-items:center;background:rgba(255,255,255,.72);backdrop-filter:blur(8px);border:1px solid #e9f1fb;border-radius:24px;padding:14px;box-shadow:var(--shadow);position:sticky;top:0;z-index:5;margin-bottom:14px;overflow:hidden}
    .hero img{width:84px;height:84px;object-fit:cover;border-radius:22px;border:3px solid #fff;box-shadow:var(--shadow);background:#eef5ff}
    h1{font-size:28px;line-height:1.1;margin:0 0 6px}.sub{color:var(--muted);font-size:14px;line-height:1.35}.grid{display:grid;gap:14px}
    .card{background:var(--card);border:1px solid #ecf2fa;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;overflow:hidden;min-width:0}
    .section-title{font-size:18px;font-weight:700;margin:0 0 10px;line-height:1.2}
    label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px;line-height:1.25}
    input,button{font:inherit}
    input[type="date"],input[type="time"],input[type="number"]{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#fbfdff;color:var(--text);outline:none;font-size:16px;line-height:1.2;appearance:none;-webkit-appearance:none;display:block;height:var(--field-h)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;align-items:end}.field{min-width:0}
    .chips{
      display:flex;
      flex-wrap:nowrap;
      gap:8px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:2px;
      scrollbar-width:none;
    }
    .chips::-webkit-scrollbar{display:none}
    .chip{
      flex:0 0 auto;
      min-width:110px;
      text-align:center;
      border:1px solid var(--line);
      background:#f7fbff;
      border-radius:999px;
      padding:10px 14px;
      cursor:pointer;
      user-select:none;
      line-height:1.15;
      font-size:15px;
      white-space:nowrap;
    }
    .chip.active{background:var(--primary2);border-color:#b8d2f3}
    .btn{border:0;border-radius:16px;min-height:48px;padding:13px 16px;background:var(--primary);color:#0d2540;font-weight:700;cursor:pointer;box-shadow:var(--shadow);line-height:1.2;display:inline-flex;align-items:center;justify-content:center;text-align:center}
    .btn.secondary{background:#eef5ff}.btn.danger{background:#ffe8e8;color:#8f2424}.btn.full{width:100%}.btn:disabled,.small-btn:disabled{opacity:.6;cursor:not-allowed}
    .stats{display:grid;gap:10px;width:100%;grid-template-columns:repeat(4,1fr)}
    .stat{background:#f8fbff;border:1px solid var(--line);padding:12px 8px;border-radius:16px;text-align:center}.stat b{display:block;font-size:22px;margin-bottom:4px;line-height:1}.stat span{display:block;font-size:13px;line-height:1.25;word-break:break-word}
    .list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fcfeff}
    .item-top{display:flex;justify-content:space-between;gap:8px;align-items:center}.badge{background:#eef5ff;border:1px solid #d8e7fb;padding:6px 10px;border-radius:999px;font-size:12px;display:inline-block}
    .muted{color:var(--muted);font-size:13px;line-height:1.35;word-break:break-word}.actions,.small-actions{display:flex;gap:8px;flex-wrap:wrap}
    .footer-note{padding:8px 4px 0;color:var(--muted);font-size:12px;text-align:center;line-height:1.35}.install{display:none}
    .status-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:10px;padding:10px 12px;border-radius:14px;border:1px solid var(--line);background:#f8fbff}
    .status-pill{padding:7px 10px;border-radius:999px;font-size:13px;font-weight:700}.status-ok{background:var(--ok);color:var(--ok-text)}.status-warn{background:var(--warn);color:var(--warn-text)}.status-err{background:var(--err);color:var(--err-text)}
    .small-btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 10px;cursor:pointer;font-size:13px}
    @media (max-width:640px){
      :root{--field-h:46px;--page-pad:12px}
      .hero{grid-template-columns:72px 1fr;gap:12px;padding:12px}
      .hero img{width:72px;height:72px}
      h1{font-size:24px}
      .row,.stats{grid-template-columns:1fr}
      .card{padding:12px}
      .section-title{font-size:17px}
      .actions .btn{width:100%}
      .item-top,.status-bar{align-items:flex-start;flex-direction:column}
      .chip{min-width:92px}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <img src="icon-192.png" alt="תינוק" />
    <div>
      <h1>מעקב תינוק 👶</h1>
      <div class="sub">מעקב יומי מסונכרן בין מכשירים.</div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="section-title">מצב סנכרון</div>
      <div class="status-bar">
        <div id="syncStatus" class="status-pill status-warn">טוען...</div>
        <div class="muted" id="syncMeta">מכין נתונים</div>
        <div class="small-actions">
          <button class="small-btn" type="button" onclick="manualRefresh()">רענון מהשרת</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">תאריך</div>
      <div class="row">
        <div class="field">
          <label for="logDate">יום מעקב</label>
          <input id="logDate" type="date" />
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button id="installBtn" class="btn secondary full install" type="button">התקן למסך הבית</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">רישום חדש</div>
      <div class="chips" id="typeChips">
        <div class="chip active" data-type="האכלה">🍼 האכלה</div>
        <div class="chip" data-type="פיפי">💧 פיפי</div>
        <div class="chip" data-type="קקי">💩 קקי</div>
        <div class="chip" data-type="ויטמינים">💊 ויטמינים</div>
      </div>
      <div class="row" style="margin-top:12px">
        <div class="field">
          <label for="time">שעה</label>
          <input id="time" type="time" />
        </div>
        <div class="field">
          <label for="amount">כמות (מ״ל)</label>
          <input id="amount" type="number" placeholder="למשל 90" />
        </div>
      </div>
      <div class="actions" style="margin-top:12px">
        <button id="saveBtn" class="btn" type="button" onclick="addEntry()">שמור רישום</button>
        <button class="btn secondary" type="button" onclick="fillNow()">שעה עכשיו</button>
        <button class="btn secondary" type="button" onclick="clearForm()">נקה</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">סיכום יומי</div>
      <div class="stats">
        <div class="stat"><b id="feedCount">0</b><span>האכלות</span></div>
        <div class="stat"><b id="feedMl">0</b><span>מ״ל סה״כ</span></div>
        <div class="stat"><b id="peeCount">0</b><span>פיפי</span></div>
        <div class="stat"><b id="poopCount">0</b><span>קקי</span></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">רישומים של היום</div>
      <div class="actions" style="margin-bottom:10px">
        <button class="btn secondary" type="button" onclick="exportJson()">ייצוא גיבוי</button>
        <button class="btn danger" type="button" onclick="clearDay()">נקה יום זה</button>
      </div>
      <div id="entries" class="list"></div>
    </div>
  </div>

  <div class="footer-note">האפליקציה מעדכנת את המסך מיד, ואז בודקת את השרת ברקע.</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby5HlpD17IG1p217ot4kwuErP4BtVZPa92H9uNQWD3JnkYCBlHyRX0FR7c0eMA1mdVGfw/exec';
const API_TOKEN = 'bt_7Fh29KqP4mX9Za81JrT6UvN2LsQ0';
const STORAGE_KEY = 'baby-tracker-v14-state';
const DEVICE_KEY = 'baby-tracker-v14-device';
const SYNC_KEY = 'baby-tracker-v14-sync-meta';

let deferredPrompt = null;
let currentType = 'האכלה';
let busy = false;

function getTodayStr(){const d=new Date();const off=d.getTimezoneOffset();return new Date(d.getTime()-off*60000).toISOString().slice(0,10)}
function nowTime(){return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false})}
function nowIso(){return new Date().toISOString()}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function typeEmoji(type){return {"האכלה":"🍼","פיפי":"💧","קקי":"💩","ויטמינים":"💊"}[type]||"•"}

function getDeviceId(){
  let id=localStorage.getItem(DEVICE_KEY);
  if(!id){
    id='dev_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
    localStorage.setItem(DEVICE_KEY,id);
  }
  return id;
}

function loadState(){
  try{
    const data=JSON.parse(localStorage.getItem(STORAGE_KEY));
    return data&&Array.isArray(data.entries)?data:{entries:[]};
  }catch{
    return {entries:[]};
  }
}

function saveState(state){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function loadSyncMeta(){
  try{return JSON.parse(localStorage.getItem(SYNC_KEY))||{};}catch{return {};}
}

function saveSyncMeta(meta){
  localStorage.setItem(SYNC_KEY,JSON.stringify(meta));
}

function normalizeDateStr(value){
  if(!value) return '';
  if(typeof value==='string'){
    if(/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
    if(/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(value)){
      const [d,m,y]=value.split('.');
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
    const parsed=new Date(value);
    if(!isNaN(parsed)){
      const off=parsed.getTimezoneOffset();
      return new Date(parsed.getTime()-off*60000).toISOString().slice(0,10);
    }
  }
  if(Object.prototype.toString.call(value)==='[object Date]' && !isNaN(value)){
    const off=value.getTimezoneOffset();
    return new Date(value.getTime()-off*60000).toISOString().slice(0,10);
  }
  return '';
}

function normalizeTimeStr(value){
  if(value===null||value===undefined||value==='') return '';
  if(Object.prototype.toString.call(value)==='[object Date]' && !isNaN(value)){
    return value.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
  }
  if(typeof value==='number' && isFinite(value)){
    const totalMinutes=Math.round((value%1)*24*60);
    const hh=String(Math.floor(totalMinutes/60)%24).padStart(2,'0');
    const mm=String(totalMinutes%60).padStart(2,'0');
    return `${hh}:${mm}`;
  }
  const s=String(value).trim();
  if(!s) return '';
  if(/^\d{2}:\d{2}$/.test(s)) return s;
  if(/^\d{2}:\d{2}:\d{2}$/.test(s)) return s.slice(0,5);
  const parsed=new Date(s);
  if(!isNaN(parsed)){
    return parsed.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
  }
  const match=s.match(/(\d{1,2}):(\d{2})/);
  if(match){
    return `${String(match[1]).padStart(2,'0')}:${match[2]}`;
  }
  return '';
}

function isDeletedValue(value){
  return value===true || String(value).toLowerCase()==='true';
}

function normalizeEntry(raw){
  return {
    id:String(raw.id||''),
    createdAt:String(raw.createdAt||raw.updatedAt||nowIso()),
    updatedAt:String(raw.updatedAt||raw.createdAt||nowIso()),
    date:normalizeDateStr(raw.date),
    time:normalizeTimeStr(raw.time),
    type:String(raw.type||''),
    amount:raw.amount===null||raw.amount===undefined?'':String(raw.amount),
    note:'',
    device:String(raw.device||''),
    deleted:isDeletedValue(raw.deleted)
  };
}

function getEntriesForDay(date){
  const state=loadState();
  return state.entries
    .map(normalizeEntry)
    .filter(e => !e.deleted && normalizeDateStr(e.date)===normalizeDateStr(date))
    .sort((a,b)=>(a.time||'').localeCompare(b.time||''));
}

function setBusy(flag){
  busy=flag;
  const saveBtn=document.getElementById('saveBtn');
  if(saveBtn) saveBtn.disabled=flag;
}

function setStatus(text,kind,metaText){
  const el=document.getElementById('syncStatus');
  const meta=document.getElementById('syncMeta');
  el.textContent=text;
  el.className=`status-pill ${kind}`;
  meta.textContent=metaText||'';
}

function setSoftMessage(message){
  saveSyncMeta({
    ...loadSyncMeta(),
    lastError: message || ''
  });
  updateSyncStatus();
}

function updateSyncStatus(){
  const meta=loadSyncMeta();

  if(!navigator.onLine){
    setStatus('אופליין','status-warn','אין חיבור כרגע');
    return;
  }

  if(busy){
    setStatus('מעדכן','status-warn','שומר או טוען נתונים מהשרת');
    return;
  }

  if(meta.lastError){
    setStatus('שים לב','status-warn',meta.lastError);
    return;
  }

  const last=meta.lastSuccessAt?new Date(meta.lastSuccessAt).toLocaleString('he-IL'):'עדיין לא בוצע';
  setStatus('מסונכרן','status-ok',`עדכון אחרון: ${last}`);
}

function render(){
  const date=document.getElementById('logDate').value;
  const entries=getEntriesForDay(date);
  const box=document.getElementById('entries');

  if(!entries.length){
    box.innerHTML='<div class="muted">עדיין אין רישומים ליום הזה.</div>';
  }else{
    box.innerHTML=entries.map(e=>`
      <div class="item">
        <div class="item-top">
          <div><span class="badge">${typeEmoji(e.type)} ${esc(e.type)}</span></div>
          <div><b>${esc(e.time||'')}</b></div>
        </div>
        <div class="muted" style="margin-top:8px">${e.amount?`כמות: <b>${esc(e.amount)}</b> מ״ל`:'ללא כמות'}</div>
        <div class="actions" style="margin-top:10px">
          <button class="btn secondary" type="button" onclick="editEntry('${e.id}')">עריכה</button>
          <button class="btn danger" type="button" onclick="deleteEntry('${e.id}')">מחיקה</button>
        </div>
      </div>`).join('');
  }

  const feedEntries=entries.filter(e=>e.type==='האכלה');
  document.getElementById('feedCount').textContent=feedEntries.length;
  document.getElementById('feedMl').textContent=feedEntries.reduce((s,e)=>s+Number(e.amount||0),0);
  document.getElementById('peeCount').textContent=entries.filter(e=>e.type==='פיפי').length;
  document.getElementById('poopCount').textContent=entries.filter(e=>e.type==='קקי').length;
  updateSyncStatus();
}

function replaceAllEntries(entries){
  saveState({entries:entries.map(normalizeEntry).filter(e=>!e.deleted)});
}

function addOrReplaceLocalEntry(entry){
  const state = loadState();
  const normalized = normalizeEntry(entry);
  const map = new Map(state.entries.map(e => [normalizeEntry(e).id, normalizeEntry(e)]));
  map.set(normalized.id, normalized);
  saveState({ entries: Array.from(map.values()).filter(e => !e.deleted) });
}

function removeLocalEntry(id){
  const state = loadState();
  saveState({
    entries: state.entries
      .map(normalizeEntry)
      .filter(e => e.id !== id)
  });
}

function makeEntry({date,time,type,amount}){
  const ts=nowIso();
  return {
    id:'entry_'+Math.random().toString(36).slice(2)+Date.now().toString(36),
    createdAt:ts,
    updatedAt:ts,
    date:normalizeDateStr(date),
    time:normalizeTimeStr(time||nowTime()),
    type:type||'',
    amount:type==='האכלה'?String(amount||''):'',
    note:'',
    device:getDeviceId(),
    deleted:false
  };
}

function fillNow(){
  document.getElementById('time').value=nowTime();
}

function clearForm(){
  document.getElementById('amount').value='';
  document.getElementById('time').value=nowTime();
}

document.querySelectorAll('#typeChips .chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('#typeChips .chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentType=chip.dataset.type;
    const amount=document.getElementById('amount');
    amount.disabled=currentType!=='האכלה';
    if(currentType!=='האכלה') amount.value='';
  });
});

async function apiGetAll(){
  const url=`${API_URL}?token=${encodeURIComponent(API_TOKEN)}&_=${Date.now()}`;
  const res=await fetch(url,{method:'GET',cache:'no-store'});
  return res.json();
}

async function apiSave(entry){
  const res=await fetch(API_URL,{
    method:'POST',
    cache:'no-store',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:API_TOKEN,action:'save',entry})
  });
  return res.json();
}

async function apiDelete(id){
  const res=await fetch(API_URL,{
    method:'POST',
    cache:'no-store',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:API_TOKEN,action:'delete',id})
  });
  return res.json();
}

async function loadFromServer(){
  const result=await apiGetAll();
  if(!result.ok) throw new Error(result.error||'Failed to fetch');
  const entries=(result.data||[]).map(normalizeEntry).filter(e=>!e.deleted);
  replaceAllEntries(entries);
  saveSyncMeta({lastSuccessAt:nowIso(),lastError:''});
}

async function loadFromServerWithRetry(retries = 3, delayMs = 1200){
  let lastError = null;

  for(let i = 0; i < retries; i++){
    try{
      await loadFromServer();
      return true;
    }catch(err){
      lastError = err;
      if(i < retries - 1){
        await new Promise(resolve => setTimeout(resolve, delayMs));
      }
    }
  }

  throw lastError;
}

function refreshInBackground(){
  setTimeout(async () => {
    try{
      await loadFromServerWithRetry(3, 1200);
      saveSyncMeta({ lastSuccessAt: nowIso(), lastError: '' });
      render();
    }catch(err){
      saveSyncMeta({
        ...loadSyncMeta(),
        lastError: 'הרענון מהשרת התעכב, אבל הפעולה נשמרה'
      });
      render();
    }
  }, 400);
}

async function addEntry(){
  if(busy) return;

  if(!navigator.onLine){
    alert('אין חיבור כרגע. נסה שוב כשהאינטרנט חוזר.');
    return;
  }

  const entry = makeEntry({
    date: document.getElementById('logDate').value,
    time: document.getElementById('time').value,
    type: currentType,
    amount: document.getElementById('amount').value
  });

  addOrReplaceLocalEntry(entry);
  clearForm();
  render();

  try{
    setBusy(true);
    updateSyncStatus();

    const result = await apiSave(entry);

    if(result && result.ok){
      saveSyncMeta({ lastSuccessAt: nowIso(), lastError: '' });
      refreshInBackground();
      return;
    }

    setSoftMessage('הפעולה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }catch(err){
    setSoftMessage('הפעולה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }finally{
    setBusy(false);
    updateSyncStatus();
  }
}

function findEntryById(id){
  return loadState().entries.map(normalizeEntry).find(e=>e.id===id);
}

async function deleteEntry(id){
  if(busy) return;

  if(!navigator.onLine){
    alert('אין חיבור כרגע. נסה שוב כשהאינטרנט חוזר.');
    return;
  }

  removeLocalEntry(id);
  render();

  try{
    setBusy(true);
    updateSyncStatus();

    const result = await apiDelete(id);

    if(result && result.ok){
      saveSyncMeta({ lastSuccessAt: nowIso(), lastError: '' });
      refreshInBackground();
      return;
    }

    setSoftMessage('המחיקה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }catch(err){
    setSoftMessage('המחיקה נשלחה, בודק מול השרת...');
    refreshInBackground();
  }finally{
    setBusy(false);
    updateSyncStatus();
  }
}

function editEntry(id){
  const e=findEntryById(id);
  if(!e) return;

  currentType=e.type;
  document.querySelectorAll('#typeChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.type===e.type));
  document.getElementById('time').value=e.time||'';
  document.getElementById('amount').value=e.amount||'';

  const amount=document.getElementById('amount');
  amount.disabled=currentType!=='האכלה';

  deleteEntry(id);
}

async function clearDay(){
  const date = document.getElementById('logDate').value;
  const entries = getEntriesForDay(date);

  if(!entries.length) return;
  if(!confirm('למחוק את כל הרישומים של היום הזה?')) return;

  if(!navigator.onLine){
    alert('אין חיבור כרגע. נסה שוב כשהאינטרנט חוזר.');
    return;
  }

  entries.forEach(entry => removeLocalEntry(entry.id));
  render();

  try{
    setBusy(true);
    updateSyncStatus();

    for(const entry of entries){
      await apiDelete(entry.id);
    }

    saveSyncMeta({ lastSuccessAt: nowIso(), lastError: '' });
    refreshInBackground();
  }catch(err){
    setSoftMessage('מחיקת היום נשלחה, בודק מול השרת...');
    refreshInBackground();
  }finally{
    setBusy(false);
    updateSyncStatus();
  }
}

function exportJson(){
  const blob=new Blob([JSON.stringify(loadState(),null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='baby-tracker-backup.json';
  a.click();
}

async function manualRefresh(){
  if(busy) return;

  if(!navigator.onLine){
    updateSyncStatus();
    return;
  }

  try{
    setBusy(true);
    updateSyncStatus();
    await loadFromServerWithRetry(3, 1200);
    saveSyncMeta({ lastSuccessAt: nowIso(), lastError: '' });
  }catch(err){
    saveSyncMeta({ ...loadSyncMeta(), lastError: 'הרענון מהשרת נכשל זמנית' });
  }finally{
    setBusy(false);
    render();
  }
}

document.getElementById('logDate').value=getTodayStr();
document.getElementById('logDate').addEventListener('change',render);

fillNow();
render();
manualRefresh();

setInterval(manualRefresh,10000);
window.addEventListener('online',manualRefresh);
window.addEventListener('focus',manualRefresh);

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js?v=14').catch(()=>{});
}

window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('installBtn').style.display='block';
});

document.getElementById('installBtn').addEventListener('click',async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
});
</script>
